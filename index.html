  <style>
    :root{--pink:#ff6fa8;--pink2:#ff8fbd;--red:#ed2b63;--yellow:#ffd900;--ink:#171717;--soft:#fff5f9;--line:#f1d7e2;--blue:#4875cb;--radius:26px;--shadow:0 20px 50px rgba(86,24,55,.18)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#fff2f7,#ffeaf3 45%,#fff);color:var(--ink);overflow:hidden}.app{height:100dvh;display:flex;flex-direction:column;position:relative}.splash{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:radial-gradient(circle at 30% 10%,#fff 0 4%,transparent 5%),linear-gradient(135deg,#ff5f99,#ffc6d9);transition:.55s ease}.splash.hide{opacity:0;pointer-events:none}.splash-card{text-align:center}.logo-bubble{width:156px;height:156px;border-radius:50%;background:#fff;padding:10px;box-shadow:0 20px 50px rgba(0,0,0,.22);animation:pop 1.4s ease infinite alternate}.logo-bubble img{width:100%;height:100%;border-radius:50%;object-fit:cover}.loading{margin-top:18px;font-weight:900;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.18);letter-spacing:.3px}@keyframes pop{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.03)}}header{height:82px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:3}.brand{display:flex;align-items:center;gap:10px;min-width:0}.brand img{width:54px;height:54px;border-radius:50%;box-shadow:0 8px 20px rgba(0,0,0,.16)}.brand h1{font-size:21px;line-height:1;margin:0;font-weight:950}.brand p{font-size:12px;margin:3px 0 0;color:#805166;font-weight:750}.top-actions{margin-left:auto;display:flex;gap:8px}.pill,.btn{border:0;border-radius:18px;background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.08);font-weight:900;padding:12px 14px;color:#222}.btn.primary{background:var(--ink);color:#fff}.main{flex:1;display:grid;grid-template-columns:300px minmax(0,1fr) 320px;gap:14px;padding:0 16px 16px;min-height:0}.panel{background:rgba(255,255,255,.82);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.75);border-radius:var(--radius);box-shadow:var(--shadow);min-height:0;overflow:hidden}.left{display:flex;flex-direction:column}.section-title{font-size:14px;font-weight:950;margin:18px 18px 10px}.people{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px 12px;overflow:auto}.person{height:58px;border:2px solid transparent;border-radius:18px;background:#fff;display:grid;place-items:center;font-weight:950;box-shadow:0 6px 18px rgba(0,0,0,.07);position:relative}.person.active{border-color:var(--red);background:#fff2f7}.person small{font-size:10px;position:absolute;bottom:5px;color:#89566b}.add{margin:4px 14px 0}.fields{padding:12px 14px;border-top:1px solid var(--line);display:grid;gap:10px}.field{display:grid;gap:6px;font-size:12px;font-weight:900;color:#87586a}.field input{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px;background:#fff;font-weight:800}.viewer{position:relative;overflow:hidden;background:linear-gradient(180deg,#fff 0%,#ffe2ed 100%)}#stage{width:100%;height:100%;display:block}.heart{position:absolute;color:#ff497e;opacity:.18;font-size:42px;pointer-events:none}.h1{left:6%;top:8%}.h2{right:10%;top:12%}.h3{left:20%;bottom:9%}.arrow{position:absolute;top:48%;transform:translateY(-50%);width:58px;height:58px;border-radius:50%;border:0;background:#fff;box-shadow:0 12px 30px rgba(0,0,0,.13);font-size:32px;font-weight:950;z-index:2}.arrow.leftA{left:18px}.arrow.rightA{right:18px}.hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(255,255,255,.88);border-radius:999px;padding:10px 16px;font-size:12px;font-weight:900;color:#714257;box-shadow:0 8px 24px rgba(0,0,0,.08);white-space:nowrap}.right{display:flex;flex-direction:column}.tabs{display:flex;gap:8px;padding:14px;overflow:auto;border-bottom:1px solid var(--line)}.tab{white-space:nowrap;border:0;border-radius:999px;padding:10px 13px;background:#fff;font-weight:950;color:#70445a}.tab.active{background:var(--pink);color:#fff}.options{padding:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:9px;overflow:auto}.opt{height:68px;border:2px solid transparent;background:#fff;border-radius:20px;display:grid;place-items:center;text-align:center;font-size:11px;font-weight:900;box-shadow:0 6px 18px rgba(0,0,0,.07);position:relative}.opt.active{border-color:var(--red)}.swatch{width:32px;height:32px;border-radius:50%;border:2px solid rgba(0,0,0,.12)}.bottom-nav{display:none}.frame-mode .main{grid-template-columns:300px minmax(0,1fr) 320px}.frame-tools{padding:14px;display:grid;gap:10px;border-top:1px solid var(--line)}.frame-list{padding:0 14px 14px;display:grid;gap:8px;overflow:auto}.frame-item{background:#fff;border-radius:16px;padding:10px;font-size:12px;font-weight:900;display:flex;justify-content:space-between;gap:8px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#171717;color:#fff;border-radius:18px;padding:12px 16px;font-weight:900;z-index:30;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:rgba(20,5,12,.5);display:none;place-items:center;z-index:40;padding:18px}.modal.show{display:grid}.modal-card{background:#fff;border-radius:28px;padding:20px;max-width:560px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.25)}textarea{width:100%;height:260px;border:1px solid var(--line);border-radius:18px;padding:14px;font-weight:700;resize:none}@media(max-width:900px){header{height:74px}.main{grid-template-columns:1fr;padding:0 10px 88px}.left,.right{position:fixed;left:10px;right:10px;bottom:78px;max-height:42dvh;z-index:8;display:none}.left.open,.right.open{display:flex}.viewer{min-height:calc(100dvh - 172px)}.bottom-nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:10;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);border-radius:24px;padding:8px;box-shadow:var(--shadow)}.bottom-nav button{border:0;background:#fff;border-radius:18px;padding:10px 4px;font-size:12px;font-weight:950}.brand h1{font-size:17px}.pill{padding:10px 11px}.arrow{width:50px;height:50px}.options{grid-template-columns:repeat(4,1fr)} }
  </style>
</head>
<body>
<div class="splash" id="splash"><div class="splash-card"><div class="logo-bubble"><img src="./logo.png" alt=""></div><div class="loading">собираем мини-мир...</div></div></div>
<div class="app">
<header><div class="brand"><img src="./logo.png" alt=""><div><h1>MiniBrick Studio</h1><p>3D конструктор мини-фигурок</p></div></div><div class="top-actions"><button class="pill" id="modeBtn">Рамка</button><button class="pill" id="orderBtn">Заказ</button></div></header>
<div class="main" id="main">
<aside class="panel left" id="peoplePanel"><div class="section-title">Человечки до 20 шт.</div><div class="people" id="people"></div><button class="btn primary add" id="addPerson">+ Добавить</button><div class="fields"><label class="field">Имя <input id="nameInput" placeholder="Например, Вика"></label><label class="field">Комментарий <input id="noteInput" placeholder="что учесть мастеру"></label></div><div class="frame-list" id="frameList"></div></aside>
<main class="panel viewer"><span class="heart h1">❤</span><span class="heart h2">❤</span><span class="heart h3">❤</span><canvas id="stage"></canvas><button class="arrow leftA" id="prevColor">‹</button><button class="arrow rightA" id="nextColor">›</button><div class="hint" id="hint">стрелки меняют цвет кожи, модель можно крутить</div></main>
<aside class="panel right" id="optionsPanel"><div class="tabs" id="tabs"></div><div class="options" id="options"></div><div class="frame-tools"><button class="btn primary" id="saveToFrame">Поместить в рамку</button><button class="btn" id="duplicatePerson">Дублировать</button><button class="btn" id="clearAll">Очистить</button></div></aside>
</div>
<nav class="bottom-nav"><button data-open="people">Люди</button><button data-cat="skin">Кожа</button><button data-open="options">Детали</button><button id="mobileFrame">Рамка</button></nav>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="modal-card"><h2>Форма заказа</h2><textarea id="orderText" readonly></textarea><div style="display:flex;gap:8px;margin-top:12px"><button class="btn primary" id="copyOrder">Скопировать</button><button class="btn" id="closeModal">Закрыть</button></div></div></div>
  <script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
const CACHE_NOTE='После правок увеличивай CACHE_NAME в sw.js';
const skinColors=['#ffd09a','#f2b779','#d89255','#8a5a3c','#fff4dc','#f2d6bf','#3b3028'];
const bodyColors=['#ffffff','#ffd900','#ff6fa8','#ec2d58','#7cc9ff','#4875cb','#222222','#7cd96b','#b88cff'];
const cats={skin:'Кожа',hair:'Причёски',torso:'Торс',legs:'Ноги',accessory:'Аксессуары',face:'Лицо'};
const optionsData={
 skin:skinColors.map((c,i)=>({id:i+1,name:`кожа ${i+1}`,color:c})),
 torso:bodyColors.map((c,i)=>({id:i+1,name:`цвет ${i+1}`,color:c})),
 legs:['синие','черные','розовые','белые','серые','красные'].map((n,i)=>({id:i+1,name:n,color:['#254f9b','#111','#ff8fbd','#fff','#777','#df214a'][i]})),
 hair:['без','каре','хвост','короткие','волны','шапка'].map((n,i)=>({id:i,name:n})),
 accessory:['нет','сердце','букет','зайчик','телефон','подарок'].map((n,i)=>({id:i,name:n})),
 face:['улыбка','милая','строгая','очки','весёлая','сонная'].map((n,i)=>({id:i,name:n}))
};
let people=JSON.parse(localStorage.getItem('mb_people')||'null')||[newPerson(1)]; let active=0, category='skin', frameMode=false;
function newPerson(n){return{name:`Человек ${n}`,note:'',skin:0,torso:2,legs:0,hair:1,accessory:0,face:0,x:0,y:0,z:0,rot:0}}
function save(){localStorage.setItem('mb_people',JSON.stringify(people))}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
const canvas=document.getElementById('stage'); const scene=new THREE.Scene(); scene.background=new THREE.Color(0xfff5f9); const camera=new THREE.PerspectiveCamera(45,1,.1,100); camera.position.set(0,2.3,6); const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); const controls=new OrbitControls(camera,canvas); controls.enableDamping=true; controls.target.set(0,1.25,0); controls.enablePan=false;
scene.add(new THREE.HemisphereLight(0xffffff,0xffc6d9,2)); const dl=new THREE.DirectionalLight(0xffffff,2.2); dl.position.set(4,6,5); scene.add(dl);
let group=new THREE.Group(); scene.add(group); let frameGroup=new THREE.Group(); scene.add(frameGroup);
    let baseFigureModel = null;

const loader = new GLTFLoader();
loader.load(
  './models/minibrick_realistic_block_figure.glb',
  (gltf) => {
    baseFigureModel = gltf.scene;
    baseFigureModel.traverse((obj) => {
      if (obj.isMesh) {
        obj.castShadow = true;
        obj.receiveShadow = true;
        obj.material = obj.material.clone();
        obj.material.roughness = 0.32;
        obj.material.metalness = 0;
      }
    });
    syncUI();
    document.getElementById('splash').classList.add('hide');
  },
  undefined,
  (error) => {
    console.error('GLB load error:', error);
    toast('Модель не загрузилась');
    document.getElementById('splash').classList.add('hide');
  }
);

function applyFigureColors(model, p) {
  const skin = skinColors[p.skin];
  const torso = optionsData.torso[p.torso].color;
  const legs = optionsData.legs[p.legs].color;

  model.traverse((obj) => {
    if (!obj.isMesh) return;

    const name = obj.name.toLowerCase();

    if (name.includes('head') || name.includes('hand') || name.includes('arm')) {
      obj.material.color.set(skin);
    } else if (name.includes('torso') || name.includes('body')) {
      obj.material.color.set(torso);
    } else if (name.includes('leg') || name.includes('foot')) {
      obj.material.color.set(legs);
    } else {
      obj.material.color.set(torso);
    }

    obj.material.roughness = 0.3;
    obj.material.metalness = 0;
  });
}

function buildRealFigure(p, scale = 1) {
  if (!baseFigureModel) {
    return buildFigure(p, scale);
  }

  const model = baseFigureModel.clone(true);

  model.traverse((obj) => {
    if (obj.isMesh) {
      obj.material = obj.material.clone();
    }
  });

  applyFigureColors(model, p);

  model.scale.setScalar(scale);
  model.position.y = 0;
  model.rotation.y = 0;

  return model;
}
function mat(c,rough=.55){return new THREE.MeshStandardMaterial({color:c,roughness:rough,metalness:.03})}
function block(w,h,d,c,r=.08){const g=new THREE.BoxGeometry(w,h,d); const m=mat(c); const mesh=new THREE.Mesh(g,m); mesh.castShadow=true; return mesh}
function cyl(r,h,c){const mesh=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,32),mat(c)); return mesh}
function buildFigure(p,scale=1){const g=new THREE.Group(); const skin=skinColors[p.skin], torso=optionsData.torso[p.torso].color, legs=optionsData.legs[p.legs].color;
 const head=block(.82,.72,.72,skin); head.position.y=2.35; g.add(head);
 const neck=cyl(.18,.12,skin); neck.position.y=1.92; g.add(neck);
 const body=block(1.05,1,.55,torso); body.position.y=1.38; g.add(body);
 const armL=cyl(.16,.88,skin); armL.rotation.z=.08; armL.position.set(-.72,1.4,0); g.add(armL); const armR=cyl(.16,.88,skin); armR.rotation.z=-.08; armR.position.set(.72,1.4,0); g.add(armR);
 const legL=block(.38,.78,.48,legs); legL.position.set(-.25,.45,0); g.add(legL); const legR=block(.38,.78,.48,legs); legR.position.set(.25,.45,0); g.add(legR);
 const footL=block(.42,.18,.66,legs); footL.position.set(-.25,.04,.08); g.add(footL); const footR=block(.42,.18,.66,legs); footR.position.set(.25,.04,.08); g.add(footR);
 const eyeM=mat('#111'); const e1=cyl(.045,.035,'#111'); e1.rotation.x=Math.PI/2; e1.position.set(-.18,2.43,.371); g.add(e1); const e2=e1.clone(); e2.position.x=.18; g.add(e2); const smile=new THREE.Mesh(new THREE.TorusGeometry(.17,.018,8,32,Math.PI),eyeM); smile.rotation.z=Math.PI; smile.position.set(0,2.25,.375); g.add(smile);
 if(p.hair>0){const hc=['#5a2c19','#d8a228','#1f1715','#7c3c26','#c86b25','#111'][p.hair-1]||'#5a2c19'; const hair=block(.92,.22,.82,hc); hair.position.y=2.78; hair.position.z=.02; g.add(hair); if(p.hair==2){const tail=cyl(.14,.7,hc); tail.rotation.x=Math.PI/2; tail.position.set(.42,2.45,-.42); g.add(tail)}}
 if(p.accessory==1){const s=block(.28,.28,.08,'#ed2b63');s.position.set(.92,1.65,.2);s.rotation.z=.75;g.add(s)}
 if(p.accessory==2){const b=cyl(.08,.75,'#168c46');b.position.set(.9,1.62,.15);b.rotation.z=.5;g.add(b);const fl=cyl(.16,.12,'#ed2b63');fl.position.set(1.1,1.95,.15);g.add(fl)}
 if(p.accessory==3){const rb=block(.34,.32,.22,'#d9b35f');rb.position.set(.9,1.45,.18);g.add(rb);const re1=cyl(.055,.32,'#d9b35f');re1.position.set(.82,1.72,.18);re1.rotation.z=.45;g.add(re1);const re2=re1.clone();re2.position.x=.98;re2.rotation.z=-.45;g.add(re2)}
 if(p.accessory==4){const ph=block(.22,.38,.06,'#111');ph.position.set(.9,1.52,.2);g.add(ph)}
 if(p.accessory==5){const gift=block(.38,.32,.32,'#ffd900');gift.position.set(.9,1.45,.18);g.add(gift)}
 g.scale.setScalar(scale); return g}
function renderModel(){
  group.clear();
  frameGroup.clear();

  const p = people[active];

  if (!frameMode) {
    const fig = buildRealFigure(p, 1.15);
    fig.position.y = -0.15;
    group.add(fig);
    document.getElementById('hint').textContent = 'стрелки меняют цвет кожи, модель можно крутить';
  } else {
    buildFrame();
    document.getElementById('hint').textContent = '3D фоторамка: до 20 фигурок внутри';
  }
}
function buildFrame(){const base=block(4.6,.12,3.2,'#f9f9f9');base.position.y=-.06;frameGroup.add(base); const back=block(4.2,2.7,.08,'#fff8fb');back.position.set(0,1.35,-.42);frameGroup.add(back); const top=block(4.8,.22,.35,'#ffffff');top.position.set(0,2.84,-.3);frameGroup.add(top); const bottom=top.clone(); bottom.position.y=-.08; frameGroup.add(bottom); const side=block(.22,2.9,.35,'#ffffff');side.position.set(-2.4,1.38,-.3);frameGroup.add(side); const side2=side.clone();side2.position.x=2.4;frameGroup.add(side2); people.forEach((p,i)=>{const fig=buildRealFigure(p,.32); const col=i%5,row=Math.floor(i/5); fig.position.set(-1.55+col*.78,.12+row*.66,-.15); fig.rotation.y=p.rot||0; frameGroup.add(fig);});}
function resize(){const r=canvas.getBoundingClientRect(); renderer.setSize(r.width,r.height,false); camera.aspect=r.width/r.height; camera.updateProjectionMatrix()} window.addEventListener('resize',resize);
function animate(){resize(); controls.update(); renderer.render(scene,camera); requestAnimationFrame(animate)} animate();
function uiPeople(){const box=document.getElementById('people'); box.innerHTML=''; people.forEach((p,i)=>{const b=document.createElement('button'); b.className='person'+(i==active?' active':''); b.innerHTML=`${i+1}<small>${p.name||'без имени'}</small>`; b.onclick=()=>{active=i; frameMode=false; syncUI()}; box.appendChild(b)}); document.getElementById('nameInput').value=people[active].name; document.getElementById('noteInput').value=people[active].note||''; document.getElementById('frameList').innerHTML=people.map((p,i)=>`<div class="frame-item"><span>${i+1}. ${p.name}</span><span>${optionsData.accessory[p.accessory].name}</span></div>`).join('')}
function uiTabs(){const t=document.getElementById('tabs'); t.innerHTML=''; Object.entries(cats).forEach(([k,v])=>{const b=document.createElement('button'); b.className='tab'+(k==category?' active':''); b.textContent=v; b.onclick=()=>{category=k; syncUI()}; t.appendChild(b)})}
function uiOptions(){const o=document.getElementById('options'); o.innerHTML=''; optionsData[category].forEach(it=>{const b=document.createElement('button'); b.className='opt'+(people[active][category]==it.id-((category=='skin'||category=='torso'||category=='legs')?1:0)?' active':''); b.innerHTML=it.color?`<span class="swatch" style="background:${it.color}"></span><span>${it.id}</span>`:`<span>${it.name}</span>`; b.onclick=()=>{people[active][category]=it.id-((category=='skin'||category=='torso'||category=='legs')?1:0); save(); syncUI()}; o.appendChild(b)})}
function syncUI(){save(); uiPeople(); uiTabs(); uiOptions(); renderModel()}
document.getElementById('prevColor').onclick=()=>{const p=people[active]; p.skin=(p.skin-1+skinColors.length)%skinColors.length; syncUI()};
document.getElementById('nextColor').onclick=()=>{const p=people[active]; p.skin=(p.skin+1)%skinColors.length; syncUI()};
document.getElementById('addPerson').onclick=()=>{if(people.length>=20)return toast('Максимум 20 человечков'); people.push(newPerson(people.length+1)); active=people.length-1; syncUI()};
document.getElementById('duplicatePerson').onclick=()=>{if(people.length>=20)return toast('Максимум 20 человечков'); people.push({...people[active],name:people[active].name+' копия'}); active=people.length-1; syncUI()};
document.getElementById('clearAll').onclick=()=>{if(confirm('Очистить всех человечков?')){people=[newPerson(1)];active=0;syncUI()}};
document.getElementById('nameInput').oninput=e=>{people[active].name=e.target.value; save(); uiPeople()}; document.getElementById('noteInput').oninput=e=>{people[active].note=e.target.value; save()};
document.getElementById('modeBtn').onclick=()=>{frameMode=!frameMode; document.getElementById('modeBtn').textContent=frameMode?'Конструктор':'Рамка'; renderModel()}; document.getElementById('mobileFrame').onclick=()=>document.getElementById('modeBtn').click(); document.getElementById('saveToFrame').onclick=()=>{frameMode=true;document.getElementById('modeBtn').textContent='Конструктор';renderModel();toast('Человечек в рамке')};
document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{document.getElementById('peoplePanel').classList.toggle('open',b.dataset.open=='people');document.getElementById('optionsPanel').classList.toggle('open',b.dataset.open=='options')}); document.querySelector('[data-cat="skin"]').onclick=()=>{category='skin';document.getElementById('optionsPanel').classList.add('open');syncUI()};
function order(){return `MiniBrick Studio — заказ\n\nВсего человечков: ${people.length}\nРамка: 3D композиция, до 20 фигурок\n\n`+people.map((p,i)=>`${i+1}. ${p.name}\n- кожа: ${p.skin+1}\n- лицо: ${optionsData.face[p.face].name}\n- причёска: ${optionsData.hair[p.hair].name}\n- торс: ${p.torso+1}\n- ноги: ${optionsData.legs[p.legs].name}\n- аксессуар: ${optionsData.accessory[p.accessory].name}\n- комментарий: ${p.note||'нет'}`).join('\n\n')}
document.getElementById('orderBtn').onclick=()=>{document.getElementById('orderText').value=order();document.getElementById('modal').classList.add('show')}; document.getElementById('closeModal').onclick=()=>document.getElementById('modal').classList.remove('show'); document.getElementById('copyOrder').onclick=async()=>{await navigator.clipboard.writeText(order()); toast('Заказ скопирован')};
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js')}
syncUI();
</script>
</body>
</html>
