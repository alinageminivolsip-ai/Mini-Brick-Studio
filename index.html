function getFrameLayout(count){
  if(count <= 2){
    return [[38,50],[62,50]].slice(0,count);
  }

  if(count <= 5){
    return [[50,30],[32,58],[50,58],[68,58],[50,76]].slice(0,count);
  }

  return [
    [42,24],[58,24],
    [25,48],[42,48],[58,48],[75,48],
    [25,72],[42,72],[58,72],[75,72]
  ].slice(0,count);
}

  function frameInfo(){

function loadImg(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=reject;
    img.src=src;
  });
}

async function exportOrderImage(){
  const info=frameInfo();

  const canvas=document.createElement('canvas');
  canvas.width=1200;
  canvas.height=1400;

  const ctx=canvas.getContext('2d');

  ctx.fillStyle='#fff7fb';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#7f4b61';
  ctx.font='900 46px Inter, Arial';
  ctx.textAlign='center';
  ctx.fillText(`Рамка: ${info.color}, ${info.size}`,600,90);

  let frameW;
let frameH;

if(frame.includes('small')){
  frameW=650;
  frameH=860;
}

if(frame.includes('square')){
  frameW=760;
  frameH=760;
}

if(frame.includes('big')){
  frameW=650;
  frameH=910;
}

const frameX=(canvas.width-frameW)/2;
const frameY=150;

  ctx.fillStyle=info.color==='черная' ? '#111' : '#fff';
  ctx.fillRect(frameX,frameY,frameW,frameH);

  ctx.strokeStyle='rgba(0,0,0,.12)';
  ctx.lineWidth=18;
  ctx.strokeRect(frameX+28,frameY+28,frameW-56,frameH-56);

  ctx.fillStyle='#f7f7f7';
  ctx.fillRect(frameX+54,frameY+54,frameW-108,frameH-108);

  if(frameBgData){
    try{
      const bg=await loadImg(frameBgData);
      ctx.save();
      ctx.beginPath();
      ctx.rect(frameX+54,frameY+54,frameW-108,frameH-108);
      ctx.clip();

      const scale=Number(frameBgScale || 1);
      const bw=(frameW-108)*scale;
      const bh=bw*(bg.height/bg.width);
      const bx=frameX+54+(frameW-108-bw)/2+Number(frameBgX || 0)*2;
      const by=frameY+54+(frameH-108-bh)/2+Number(frameBgY || 0)*2;

      ctx.drawImage(bg,bx,by,bw,bh);
      ctx.restore();
    }catch(e){}
  }

  const positions=getFrameLayout(people.length);

  for(let i=0;i<people.length;i++){
    const p=people[i];
    const [px,py]=positions[i];

    const x=frameX + frameW*px/100;
    const y=frameY + frameH*py/100;
    const w=120;
    const h=180;

    try{
      const skin=await loadImg('./assets/body/skin-mask.png');
      const torso=await loadImg('./assets/body/torso-mask.png');
      const legs=await loadImg('./assets/body/legs-mask.png');
      const outline=await loadImg('./assets/body/base-outline.png');
      const face=await loadImg(`./assets/faces/${p.face}.png`);
      const hairImg=await loadImg(`./assets/hair/${p.hair}.png`);

      drawTinted(ctx,skin,skinColors[p.skin],x-w/2,y-h/2,w,h);
      drawTinted(ctx,torso,bodyColors[p.torso],x-w/2,y-h/2,w,h);
      drawTinted(ctx,legs,bodyColors[p.legs],x-w/2,y-h/2,w,h);

      ctx.globalAlpha=.18;
      ctx.drawImage(outline,x-w/2,y-h/2,w,h);
      ctx.globalAlpha=1;

      ctx.drawImage(face,x-w/2,y-h/2,w,h);
      ctx.drawImage(hairImg,x-w/2,y-h/2,w,h);
    }catch(e){}
  }

  ctx.fillStyle='#171717';
  ctx.font='900 34px Inter, Arial';
  ctx.textAlign='left';
  const textStartY = frameY + frameH + 80;
ctx.fillText('Файлы для заказа:',90,textStartY);

  ctx.font='700 24px Inter, Arial';
  let y=textStartY + 50;

  people.forEach((p,i)=>{
    ctx.fillText(`${i+1}. ${p.name}: лицо ${p.face}, прическа ${p.hair}`,90,y);
    y+=38;
  });

  return canvas.toDataURL('image/png');
}

function drawTinted(ctx,img,color,x,y,w,h){
  const temp=document.createElement('canvas');
  temp.width=w;
  temp.height=h;

  const t=temp.getContext('2d');
  t.drawImage(img,0,0,w,h);
  t.globalCompositeOperation='source-in';
  t.fillStyle=color;
  t.fillRect(0,0,w,h);

  ctx.drawImage(temp,x,y,w,h);
}

  const info=frameInfo();

  orderPreviewImg.src=imgData;
  orderInfo.innerHTML=`
    <div>Цвет рамки: ${info.color}</div>
    <div>Размер рамки: ${info.size}</div>
    <div>Человечков: ${people.length}</div>
  `;

  orderTextarea.value=orderText();
  orderModal.classList.add('open');
}

orderClose.onclick=()=>{
  orderModal.classList.remove('open');
};

copyOrderText.onclick=()=>{
  navigator.clipboard?.writeText(orderTextarea.value);
  alert('Текст заказа скопирован');
};

downloadOrderImg.onclick=()=>{
  const a=document.createElement('a');
  a.href=orderPreviewImg.src;
  a.download='minibrick-order.png';
  a.click();
};
function applyFrameBg(){
  document.documentElement.style.setProperty('--frame-bg', frameBgData ? `url(${frameBgData})` : 'none');
  document.documentElement.style.setProperty('--bg-scale', frameBgScale);
  document.documentElement.style.setProperty('--bg-x', frameBgX + 'px');
  document.documentElement.style.setProperty('--bg-y', frameBgY + 'px');

  if(bgScale) bgScale.value = frameBgScale;
  if(bgX) bgX.value = frameBgX;
  if(bgY) bgY.value = frameBgY;
}

bgInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    frameBgData = reader.result;
    localStorage.setItem('mb_frame_bg', frameBgData);
    applyFrameBg();
    tab = 'frame';
    frameMode = true;
    sync();
  };
  reader.readAsDataURL(file);
};

bgScale.oninput = e => {
  frameBgScale = e.target.value;
  localStorage.setItem('mb_frame_bg_scale', frameBgScale);
  applyFrameBg();
};

bgX.oninput = e => {
  frameBgX = e.target.value;
  localStorage.setItem('mb_frame_bg_x', frameBgX);
  applyFrameBg();
};

bgY.oninput = e => {
  frameBgY = e.target.value;
  localStorage.setItem('mb_frame_bg_y', frameBgY);
  applyFrameBg();
};

clearBg.onclick = () => {
  frameBgData = '';
  localStorage.removeItem('mb_frame_bg');
  applyFrameBg();
};

applyFrameBg();
 function assetExists(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(true);
    img.onerror=()=>resolve(false);
    img.src=src + '?v=' + Date.now();
  });
}

async function filterExistingAssets(list, folder){
  const result=[];
  for(const id of list){
    const ok=await assetExists(`./assets/${folder}/${id}.png`);
    if(ok) result.push(id);
  }
  return result;
}

async function loadCatalog(){
  try{
    const res=await fetch('./assets/catalog.json?v=' + Date.now());
    if(!res.ok) throw new Error('catalog not found');

    const data=await res.json();

    if(Array.isArray(data.faces)){
      faces=await filterExistingAssets(data.faces,'faces');
      if(!faces.length) faces=['A1'];
    }

    if(Array.isArray(data.hair)){
      hair=await filterExistingAssets(data.hair,'hair');
      if(!hair.length) hair=[1];
    }
  }catch(e){
    console.log('Каталог ассетов не загрузился', e);
  }
}
  startCustomize.onclick = () => {
  document.body.classList.add('customization-started');
  localStorage.setItem('mb_started','1');

  mobileTab='people';
  tab='face';
  frameMode=false;

  sync();
};

if(localStorage.getItem('mb_started') === '1'){
  document.body.classList.add('customization-started');
}
loadCatalog().then(()=>{
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js');
  }
  sync();
});
 window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('splashScreen')?.classList.add('hide');
  },2200);
});
</script>
