<body>
<div class="app">

  <img class="shadow-layer" src="./assets/body/base-outline.png" alt="">
  <img class="face-img" src="./assets/faces/${p.face}.png" alt="">
  <img class="hair-img" src="./assets/hair/${p.hair}.png" alt="">
</div>
      <div class="person-name">${p.name}</div>
    `;

    b.onclick=(e)=>{
      if(e.target.dataset.delete !== undefined){
        e.stopPropagation();

        if(people.length===1){
          alert('Нужен хотя бы один человечек');
          return;
        }

        people.splice(i,1);

        if(active>=people.length){
          active=people.length-1;
        }

        sync();
        return;
      }

      active=i;
      frameMode=false;
      sync();
    };

    peopleEl.appendChild(b);
  });

  nameInput.value=people[active].name;
  noteInput.value=people[active].note;
}function renderTabs(){tabs.innerHTML='';Object.entries(tabLabels).forEach(([k,v])=>{const b=document.createElement('button');b.className='tab '+(tab===k?'active':'');b.textContent=v;b.onclick=()=>{tab=k;frameMode=k==='frame';sync()};tabs.appendChild(b)})}function optButton(label,isActive,onClick,color){const b=document.createElement('button');b.className='opt '+(isActive?'active':'');b.innerHTML=color?`<span class="swatch" style="background:${color}"></span><span>${label}</span>`:label;b.onclick=onClick;options.appendChild(b)}function renderOptions(){options.innerHTML='';const p=people[active];if(tab==='face')faces.forEach(id=>optButton(id,p.face===id,()=>{p.face=id;sync()}));if(tab==='hair')hair.forEach(id=>optButton(id,p.hair===id,()=>{p.hair=id;sync()}));if(tab==='skin')Object.entries(skinColors).forEach(([id,c])=>optButton(id,+p.skin===+id,()=>{p.skin=+id;sync()},c));if(tab==='torso')Object.entries(bodyColors).forEach(([id,c])=>optButton(id,+p.torso===+id,()=>{p.torso=+id;sync()},c));if(tab==='legs')Object.entries(bodyColors).forEach(([id,c])=>optButton(id,+p.legs===+id,()=>{p.legs=+id;sync()},c));if(tab==='frame')frames.forEach(f=>optButton(f.name,frame===f.id,()=>{frame=f.id;frameMode=true;sync()}))}function renderFigure(){const p=people[active];document.documentElement.style.setProperty('--skin',skinColors[p.skin]);document.documentElement.style.setProperty('--torso',bodyColors[p.torso]);document.documentElement.style.setProperty('--legs',bodyColors[p.legs]);faceImg.src=`./assets/faces/${p.face}.png`;faceImg.onerror=()=>{faceImg.removeAttribute('src')};hairImg.src=`./assets/hair/${p.hair}.png`;hairImg.onerror=()=>{hairImg.removeAttribute('src')};constructorView.classList.toggle('hidden',frameMode);frameView.classList.toggle('hidden',!frameMode);renderFrame()}function getFrameLayout(count){
  if(count <= 2){
    return [[38,50],[62,50]].slice(0,count);
  }

  if(count <= 5){
    return [[50,30],[32,58],[50,58],[68,58],[50,76]].slice(0,count);
  }

  return [
    [42,24],[58,24],
    [25,48],[42,48],[58,48],[75,48],
    [25,72],[42,72],[58,72],[75,72]
  ].slice(0,count);
}

function miniFigureHTML(p,x,y){
  return `
    <div class="mini-figure" style="
      left:${x}%;
      top:${y}%;
      --skin:${skinColors[p.skin]};
      --torso:${bodyColors[p.torso]};
      --legs:${bodyColors[p.legs]};
    ">
      <div class="part skin"></div>
      <div class="part torso"></div>
      <div class="part legs"></div>
      <img class="shadow-layer" src="./assets/body/base-outline.png" alt="">
      <img class="face-img" src="./assets/faces/${p.face}.png" alt="">
      <img class="hair-img" src="./assets/hair/${p.hair}.png" alt="">
    </div>
  `;
}

function renderFrame(){
  const f=frames.find(x=>x.id===frame);
  frameBox.className='frame-box '+f.cls;
  frameLabel.textContent=f.name;

  if(!document.getElementById('frameBg')){
    frameBox.insertAdjacentHTML('afterbegin','<div class="frame-bg" id="frameBg"></div>');
  }

  const positions=getFrameLayout(people.length);

  miniGrid.innerHTML=people
    .map((p,i)=>miniFigureHTML(p,positions[i][0],positions[i][1]))
    .join('');
}
  function orderText(){return `MiniBrick Studio — заказ\n\nРамка: ${frames.find(f=>f.id===frame).name}\nКоличество человечков: ${people.length}\n\n`+people.map((p,i)=>`${i+1}. ${p.name}\nЛицо: ${p.face}\nПрическа: ${p.hair}\nКожа: ${p.skin}\nТорс: ${p.torso}\nНоги: ${p.legs}\nКомментарий: ${p.note||'нет'}`).join('\n\n')}function sync(){
  save();
  renderPeople();
  renderTabs();
  renderOptions();
  renderFigure();
  renderMobileEditor();

  document.querySelectorAll('[data-mobile-tab]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.mobileTab===mobileTab);
  });
}const peopleEl=document.getElementById('people'),nameInput=document.getElementById('nameInput'),noteInput=document.getElementById('noteInput');addPerson.onclick=()=>{if(people.length>=10)return alert('Можно добавить максимум 10 человечков');people.push(newPerson(people.length+1));active=people.length-1;sync()};nameInput.oninput=e=>{people[active].name=e.target.value;save();renderPeople()};noteInput.oninput=e=>{people[active].note=e.target.value;save()};frameBtn.onclick=()=>{
  mobileTab='frame';
  tab='frame';
  frameMode=true;
  sync();
};
  orderBtn.onclick=()=>{navigator.clipboard?.writeText(orderText());alert(orderText())};
  let frameBgData = localStorage.getItem('mb_frame_bg') || '';
let frameBgScale = localStorage.getItem('mb_frame_bg_scale') || '1';
let frameBgX = localStorage.getItem('mb_frame_bg_x') || '0';
let frameBgY = localStorage.getItem('mb_frame_bg_y') || '0';

  function mobileChip(label,isActive,onClick,color){
  const b=document.createElement('button');
 b.className=(label==='← К персонажу'?'back-to-person':'mobile-chip')+' '+(isActive?'active':'');
  b.innerHTML=color ? `<span class="mobile-swatch" style="background:${color}"></span><small>${label}</small>` : label;
  b.onclick=onClick;
  mobileEditorInner.appendChild(b);
}

function renderMobileEditor(){
  if(!mobileEditorInner) return;

  mobileEditorInner.innerHTML='';
  const p=people[active];
 if(mobileTab==='people'){
  if(!p.names) p.names=[p.name || `Человек ${active+1}`];

  const nameBox=document.createElement('div');
  nameBox.className='mobile-names-box';

  nameBox.innerHTML=`
    <label class="names-toggle">
      <input type="checkbox" ${p.namesEnabled?'checked':''}>
      <span>Имена</span>
    </label>

    <div class="names-list">
      ${p.names.map((name,i)=>`
        <div class="name-row">
          <input data-name-index="${i}" value="${name}" placeholder="Имя">
          ${p.namesEnabled ? `<button data-add-name="${i}" type="button">+</button>` : ''}
        </div>
      `).join('')}
    </div>
  `;

  mobileEditorInner.appendChild(nameBox);

  nameBox.querySelector('.names-toggle input').onchange=e=>{
    p.namesEnabled=e.target.checked;
    sync();
  };

  nameBox.querySelectorAll('[data-name-index]').forEach(input=>{
    input.oninput=e=>{
      const i=+e.target.dataset.nameIndex;
      p.names[i]=e.target.value;
      p.name=p.names.filter(Boolean).join(' + ') || `Человек ${active+1}`;
      save();
      renderPeople();
    };
  });

  nameBox.querySelectorAll('[data-add-name]').forEach(btn=>{
    btn.onclick=()=>{
      if(p.names.length>=3) return alert('Максимум 3 имени на человечка');
      p.names.push('');
      sync();
    };
  });

  people.forEach((person,i)=>{
    mobileChip(person.name,i===active,()=>{
      active=i;
      frameMode=false;
      sync();
    });
  });

  mobileChip('+',false,()=>{
    if(people.length>=10) return alert('Можно добавить максимум 10 человечков');
    people.push(newPerson(people.length+1));
    active=people.length-1;
    sync();
  });

  return;
}

  if(mobileTab==='face'){
    faces.forEach(id=>{
      mobileChip(id,p.face===id,()=>{
        p.face=id;
        sync();
      });
    });
    return;
  }

  if(mobileTab==='hair'){
    hair.forEach(id=>{
      mobileChip(id,p.hair===id,()=>{
        p.hair=id;
        sync();
      });
    });
    return;
  }

  if(mobileTab==='colors'){
    const tabsWrap=document.createElement('div');
    tabsWrap.className='mobile-color-tabs';
    tabsWrap.innerHTML=`
      <button class="${mobileColorPart==='skin'?'active':''}" data-color-part="skin">Кожа</button>
      <button class="${mobileColorPart==='torso'?'active':''}" data-color-part="torso">Торс</button>
      <button class="${mobileColorPart==='legs'?'active':''}" data-color-part="legs">Ноги</button>
    `;
    mobileEditorInner.appendChild(tabsWrap);

    tabsWrap.querySelectorAll('button').forEach(btn=>{
      btn.onclick=()=>{
        mobileColorPart=btn.dataset.colorPart;
        renderMobileEditor();
      };
    });

    const palette=mobileColorPart==='skin' ? skinColors : bodyColors;

    Object.entries(palette).forEach(([id,c])=>{
      mobileChip(id,+p[mobileColorPart]===+id,()=>{
        p[mobileColorPart]=+id;
        sync();
      },c);
    });

    return;
  }

  if(mobileTab==='frame'){
    frameMode=true;
    tab='frame';
mobileChip('← К персонажу',false,()=>{
  mobileTab='face';
  tab='face';
  frameMode=false;
  sync();
});
    frames.forEach(f=>{
      mobileChip(f.name,frame===f.id,()=>{
        frame=f.id;
        frameMode=true;
        sync();
      });
    });

    mobileChip('Фон',false,()=>{
      bgInput.click();
    });

    mobileChip('−',false,()=>{
      frameBgScale=Math.max(0.5, Number(frameBgScale)-0.1).toFixed(2);
      localStorage.setItem('mb_frame_bg_scale', frameBgScale);
      applyFrameBg();
    });

    mobileChip('+',false,()=>{
      frameBgScale=Math.min(2.5, Number(frameBgScale)+0.1).toFixed(2);
      localStorage.setItem('mb_frame_bg_scale', frameBgScale);
      applyFrameBg();
    });
  }
}

document.querySelectorAll('[data-mobile-tab]').forEach(btn=>{
  btn.onclick=()=>{
    mobileTab=btn.dataset.mobileTab;

    if(mobileTab==='frame'){
      tab='frame';
      frameMode=true;
    }else{
      frameMode=false;
      if(mobileTab==='face') tab='face';
      if(mobileTab==='hair') tab='hair';
      if(mobileTab==='colors') tab='skin';
    }

    sync();
  };
});
function applyFrameBg(){
  document.documentElement.style.setProperty('--frame-bg', frameBgData ? `url(${frameBgData})` : 'none');
  document.documentElement.style.setProperty('--bg-scale', frameBgScale);
  document.documentElement.style.setProperty('--bg-x', frameBgX + 'px');
  document.documentElement.style.setProperty('--bg-y', frameBgY + 'px');

  if(bgScale) bgScale.value = frameBgScale;
  if(bgX) bgX.value = frameBgX;
  if(bgY) bgY.value = frameBgY;
}

bgInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    frameBgData = reader.result;
    localStorage.setItem('mb_frame_bg', frameBgData);
    applyFrameBg();
    tab = 'frame';
    frameMode = true;
    sync();
  };
  reader.readAsDataURL(file);
};

bgScale.oninput = e => {
  frameBgScale = e.target.value;
  localStorage.setItem('mb_frame_bg_scale', frameBgScale);
  applyFrameBg();
};

bgX.oninput = e => {
  frameBgX = e.target.value;
  localStorage.setItem('mb_frame_bg_x', frameBgX);
  applyFrameBg();
};

bgY.oninput = e => {
  frameBgY = e.target.value;
  localStorage.setItem('mb_frame_bg_y', frameBgY);
  applyFrameBg();
};

clearBg.onclick = () => {
  frameBgData = '';
  localStorage.removeItem('mb_frame_bg');
  applyFrameBg();
};

applyFrameBg();
 function assetExists(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(true);
    img.onerror=()=>resolve(false);
    img.src=src + '?v=' + Date.now();
  });
}

async function filterExistingAssets(list, folder){
  const result=[];
  for(const id of list){
    const ok=await assetExists(`./assets/${folder}/${id}.png`);
    if(ok) result.push(id);
  }
  return result;
}

async function loadCatalog(){
  try{
    const res=await fetch('./assets/catalog.json?v=' + Date.now());
    if(!res.ok) throw new Error('catalog not found');

    const data=await res.json();

    if(Array.isArray(data.faces)){
      faces=await filterExistingAssets(data.faces,'faces');
      if(!faces.length) faces=['A1'];
    }

    if(Array.isArray(data.hair)){
      hair=await filterExistingAssets(data.hair,'hair');
      if(!hair.length) hair=[1];
    }
  }catch(e){
    console.log('Каталог ассетов не загрузился', e);
  }
}
loadCatalog().then(()=>{
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js');
  }
  sync();
});
</script>
