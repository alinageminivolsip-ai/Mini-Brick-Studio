<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ff6fa8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="MiniBrick Studio" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<title>MiniBrick Studio v4</title>
<style>
:root{
  --pink:#ff6fa8;--pink2:#fff0f6;--red:#ed2b63;--ink:#171717;--brown:#6a351d;--muted:#86536a;--line:#f1d7e2;--soft:#fff7fb;
  --skin:#FFD200;--torso:#FF6FA8;--legs:#254F9B;--frameColor:#fff;--safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:var(--ink)}button,input,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
body{background:linear-gradient(180deg,#fff7fb 0,#fff 58%)}
.app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border-bottom:1px solid #eee;padding:10px 14px;display:flex;align-items:center;gap:10px;padding-top:calc(10px + env(safe-area-inset-top,0px))}
.logo{width:42px;height:42px;border-radius:14px;object-fit:cover}.brand{min-width:0;flex:1}.brand h1{font-size:18px;line-height:1;margin:0;font-weight:950;letter-spacing:-.03em}.brand p{margin:3px 0 0;color:var(--muted);font-weight:850;font-size:12px}.top-actions{display:flex;gap:6px}.btn{border:0;border-radius:999px;background:#fff;color:#111;font-weight:950;padding:12px 16px;box-shadow:0 8px 22px rgba(0,0,0,.08);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}.btn.dark{background:#151515;color:#fff}.btn.pink{background:var(--pink);color:#fff}.btn.ghost{background:#fff0f5;color:var(--red);box-shadow:none;border:2px solid var(--line)}.top-actions .btn{height:38px;padding:0 12px;font-size:13px}

.workspace{display:grid;grid-template-columns:300px minmax(0,1fr) 380px;gap:14px;padding:14px;min-height:0;flex:1}.panel{background:#fff;border:1px solid #f4dbe5;border-radius:28px;box-shadow:0 22px 60px rgba(86,24,55,.12);overflow:hidden}.panel-pad{padding:18px}.title{font-size:18px;margin:0 0 12px;font-weight:950}.small{font-size:12px;color:var(--muted);font-weight:850}.people-list{display:grid;gap:10px;max-height:calc(100dvh - 230px);overflow:auto}.person-card{display:grid;grid-template-columns:56px 1fr auto;gap:10px;align-items:center;background:#fff;border:2px solid #f6e1ea;border-radius:22px;padding:10px}.person-card.active{border-color:var(--red);background:#fff7fb}.person-title{font-size:15px;font-weight:950}.person-meta{font-size:11px;color:var(--muted);font-weight:850}.icon-btn{width:34px;height:34px;border:0;border-radius:14px;background:#fff0f5;color:var(--red);font-weight:950}.add-card{width:100%;margin-top:12px}.field{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:900;margin-top:12px}.field input,.field textarea{border:2px solid var(--line);border-radius:18px;padding:13px 14px;background:#fff;font-weight:850;width:100%;resize:vertical}.field input:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(237,43,99,.12)}

.viewer{position:relative;min-height:620px;background:linear-gradient(180deg,#fff9fc,#fff0f6);display:grid;place-items:center;overflow:hidden}.viewer::before,.viewer::after{content:'❤';position:absolute;color:#ff9cbc;opacity:.18;font-size:42px}.viewer::before{left:10%;top:18%}.viewer::after{right:12%;top:20%}.stage-toolbar{position:absolute;top:14px;right:14px;z-index:10;display:flex;gap:8px}.stage-toolbar .btn{height:40px;padding:0 14px;font-size:13px}
.figure-viewport{position:relative;width:100%;height:100%;min-height:520px;overflow:hidden;display:grid;place-items:center}.figure-wrap{position:relative;width:min(40vw,310px);aspect-ratio:1024/1536;filter:drop-shadow(0 24px 28px rgba(70,20,40,.18));transition:transform .45s cubic-bezier(.2,.9,.25,1), width .45s cubic-bezier(.2,.9,.25,1)}
.figure-wrap.focus-skin{width:min(62vw,470px);transform:translateY(33%) scale(1.8)}.figure-wrap.focus-hair{width:min(56vw,430px);transform:translateY(22%) scale(1.55)}.figure-wrap.focus-torso{width:min(58vw,430px);transform:translateY(-7%) scale(1.65)}.figure-wrap.focus-legs{width:min(44vw,320px);transform:translateY(-16%) scale(1.18)}.figure-wrap.focus-accessory{width:min(42vw,310px);transform:translateY(-4%) scale(1.05)}.figure-wrap.focus-full{width:min(40vw,310px);transform:translateY(2%) scale(1)}
.part,.shadow-layer,.face-img,.hair-img,.print-img,.acc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}.skin{z-index:1;background:var(--skin);mask:url('./assets/body/skin-mask.png') center/contain no-repeat;-webkit-mask:url('./assets/body/skin-mask.png') center/contain no-repeat}.torso{z-index:2;background:var(--torso);mask:url('./assets/body/torso-mask.png') center/contain no-repeat;-webkit-mask:url('./assets/body/torso-mask.png') center/contain no-repeat}.legs{z-index:3;background:var(--legs);mask:url('./assets/body/legs-mask.png') center/contain no-repeat;-webkit-mask:url('./assets/body/legs-mask.png') center/contain no-repeat}.shadow-layer{z-index:8;opacity:.18;mix-blend-mode:multiply;filter:contrast(.85) brightness(1.35)}.print-img{z-index:9;width:22%;height:auto;left:50%;top:42%;transform:translate(-50%,-50%);object-fit:contain;filter:drop-shadow(0 2px 2px rgba(0,0,0,.15))}.face-img{z-index:15}.hair-img{z-index:18}.acc-img{z-index:22;transform:scale(.9)}.mini-preview{position:relative;width:52px;aspect-ratio:1024/1536;filter:drop-shadow(0 4px 8px rgba(0,0,0,.12))}.mini-preview .skin{background:var(--p-skin)}.mini-preview .torso{background:var(--p-torso)}.mini-preview .legs{background:var(--p-legs)}

.steps-nav{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px}.step-btn{border:2px solid #f6e1ea;background:#fff;border-radius:18px;padding:10px 6px;font-weight:950;color:var(--muted);display:grid;gap:3px;place-items:center}.step-btn .num{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#fff0f5;color:var(--red);font-size:13px}.step-btn.active{border-color:var(--red);background:#fff6fa;color:var(--red);box-shadow:0 8px 22px rgba(237,43,99,.14)}.step-btn.done .num{background:var(--red);color:#fff}.editor-body{height:calc(100dvh - 190px);overflow-y:auto;padding-right:4px}.section-title{display:flex;align-items:center;gap:10px;margin:10px 0 14px;color:var(--brown);font-size:25px;font-weight:950;letter-spacing:-.03em}.badge{background:#ffd7ea;color:var(--red);border-radius:14px;padding:6px 10px;font-size:18px}.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.choice{position:relative;min-height:92px;border:2px solid transparent;background:#fff;border-radius:22px;display:grid;place-items:center;box-shadow:0 8px 20px rgba(0,0,0,.06);overflow:hidden;font-weight:950;color:#1684f2}.choice.active{border-color:var(--red);background:#fff5f8;box-shadow:0 8px 20px rgba(237,43,99,.16)}.choice.active::after{content:'✓';position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;display:grid;place-items:center}.choice img{width:100%;height:100%;object-fit:contain;pointer-events:none}.choice.face img{transform:scale(1.8)}.choice.hair img{transform:scale(2.55)}.choice.acc img{transform:scale(1.1)}.swatch{width:48px;height:48px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.18);border:3px solid transparent}.choice.active .swatch{border-color:#171717;transform:scale(1.1)}.group{margin-bottom:18px}.group-title{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:950;margin:0 0 10px}.swatches{display:flex;flex-wrap:wrap;gap:10px}.swatch-btn{width:46px;height:46px;border-radius:15px;border:3px solid transparent;box-shadow:0 3px 10px rgba(0,0,0,.16)}.swatch-btn.active{border-color:#171717;transform:scale(1.14)}.print-card{display:grid;gap:12px;background:#fff;border-radius:22px;padding:14px;border:2px solid #f6e1ea;margin-bottom:12px}.file-label{display:grid;place-items:center;min-height:58px;border-radius:18px;background:#151515;color:#fff;font-weight:950}.file-label input{display:none}.empty{grid-column:1/-1;color:var(--muted);font-weight:850;text-align:center;padding:18px}
.frame-tools{display:grid;gap:14px}.frame-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.frame-row.three{grid-template-columns:repeat(3,1fr)}.frame-choice{border:2px solid #f6e1ea;border-radius:18px;background:#fff;padding:14px 8px;font-weight:950;color:var(--muted)}.frame-choice.active{border-color:var(--red);background:#fff6fa;color:var(--red)}.frame-preview{display:grid;place-items:center;gap:16px}.frame-box{position:relative;overflow:hidden;background:#f7f7f7;display:grid;place-items:center;box-shadow:inset 0 0 0 12px var(--frameColor,#fff),inset 0 0 0 16px rgba(0,0,0,.08),0 18px 36px rgba(0,0,0,.12)}.frame-white{--frameColor:#fff}.frame-black{--frameColor:#111}.f-small{width:210px;height:278px}.f-square{width:270px;height:270px}.f-big{width:250px;height:350px}.frame-bg{position:absolute;inset:16px;background-size:cover;background-position:center;z-index:0}.mini-grid{position:relative;width:100%;height:100%;z-index:2}.mini-figure{position:absolute;aspect-ratio:1024/1536;transform:translate(-50%,-50%)}.mini-figure .skin{background:var(--skin)}.mini-figure .torso{background:var(--torso)}.mini-figure .legs{background:var(--legs)}
.modal{position:fixed;inset:0;z-index:90;display:none;place-items:center;background:rgba(40,10,25,.42);backdrop-filter:blur(12px);padding:18px}.modal.open{display:grid}.modal-card{width:min(560px,100%);max-height:88dvh;overflow:auto;background:#fff;border-radius:30px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.24)}.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.modal-head h2{font-size:28px;margin:0;font-weight:950}.close{width:48px;height:48px;border:0;border-radius:50%;background:#fff0f5;color:var(--red);font-size:28px;font-weight:950}.order-preview{border-radius:24px;overflow:hidden;background:#fff7fb;border:1px solid var(--line);margin-bottom:12px}.order-preview img{width:100%}.order-info{display:grid;gap:7px;padding:12px;border-radius:18px;background:#fff0f6;color:#7f4b61;font-weight:950;margin-bottom:12px}.order-steps{display:grid;gap:10px}.contact-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.order-text{display:none}
@media(max-width:900px){
  body{background:#fff;overflow:auto}.topbar{box-shadow:0 1px 0 rgba(0,0,0,.08)}.logo{width:34px;height:34px;border-radius:11px}.brand h1{font-size:16px}.top-actions .btn{height:34px;font-size:12px;padding:0 10px}.top-actions #showPeopleBtn{display:none}
  .workspace{display:block;padding:0}.panel.left{display:none}.panel.editor{border:0;border-radius:0;box-shadow:none;background:#fff}.viewer{position:sticky;top:55px;z-index:25;height:46dvh;min-height:330px;border-radius:0;box-shadow:0 1px 0 rgba(0,0,0,.08)}.figure-viewport{min-height:100%;height:100%}.figure-wrap{width:168px}.figure-wrap.focus-skin{width:240px;transform:translateY(34%) scale(1.75)}.figure-wrap.focus-hair{width:240px;transform:translateY(24%) scale(1.55)}.figure-wrap.focus-torso{width:235px;transform:translateY(-5%) scale(1.55)}.figure-wrap.focus-legs{width:190px;transform:translateY(-14%) scale(1.18)}.figure-wrap.focus-accessory{width:185px;transform:translateY(-4%) scale(1.05)}.figure-wrap.focus-full{width:174px;transform:translateY(0) scale(1)}.stage-toolbar{top:10px;right:10px}.stage-toolbar .btn{height:34px;font-size:12px;padding:0 12px}.editor{display:block!important}.panel-pad{padding:16px}.steps-nav{display:flex;overflow-x:auto;gap:10px;padding:2px 0 12px;margin:0 -2px 10px}.step-btn{min-width:104px}.editor-body{height:auto;overflow:visible;padding-right:0}.section-title{font-size:26px;margin-top:14px}.choice-grid{grid-template-columns:repeat(3,1fr);gap:12px}.choice{min-height:104px;border-radius:20px}.choice.face img{transform:scale(2.0)}.choice.hair img{transform:scale(2.8)}.field input,.field textarea{font-size:16px}.frame-box.f-small{width:168px;height:222px}.frame-box.f-square{width:214px;height:214px}.frame-box.f-big{width:168px;height:236px}.modal-card{border-radius:28px}.brand p{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <img class="logo" src="./logo.png" alt="">
    <div class="brand"><h1>MiniBrick Studio</h1><p>Конструктор мини-фигурок</p></div>
    <div class="top-actions"><button class="btn" id="showPeopleBtn">Фигурки</button><button class="btn" id="frameBtn">Рамка</button><button class="btn dark" id="orderBtn">Заказ</button></div>
  </header>

  <div class="workspace">
    <aside class="panel left"><div class="panel-pad"><h2 class="title">Фигурки <span id="countLabel" class="small"></span></h2><div class="people-list" id="peopleList"></div><button class="btn dark add-card" id="addPerson">+ Добавить фигурку</button></div></aside>

    <main class="panel viewer" id="viewer">
      <div class="stage-toolbar"><button class="btn ghost" id="undoBtn">↶</button><button class="btn pink" id="randomBtn">🎲</button></div>
      <section class="figure-viewport" id="figureViewport">
        <div id="constructorView" class="figure-wrap focus-skin">
          <div class="part skin"></div><div class="part torso"></div><div class="part legs"></div>
          <img class="shadow-layer" src="./assets/body/base-outline.png" alt=""><img class="face-img" id="faceImg" alt=""><img class="hair-img" id="hairImg" alt=""><img class="print-img hidden" id="printImg" alt=""><img class="acc-img hidden" id="accImg" alt="">
        </div>
        <section id="frameView" class="frame-preview hidden"><div class="frame-box f-square frame-white" id="frameBox"><div class="mini-grid" id="miniGrid"></div></div><b id="frameLabel" class="small"></b></section>
      </section>
    </main>

    <section class="panel editor"><div class="panel-pad">
      <nav class="steps-nav" id="stepsNav"></nav>
      <div class="editor-body" id="editorBody"></div>
    </div></section>
  </div>
</div>

<div class="modal" id="orderModal"><div class="modal-card"><div class="modal-head"><h2>Заказ</h2><button class="close" id="orderClose">×</button></div><div class="order-preview"><img id="orderPreviewImg" alt=""></div><div class="order-info" id="orderInfo"></div><textarea id="orderTextarea" class="order-text" readonly></textarea><div class="order-steps"><button class="btn dark" id="downloadOrderImg">1. Скачать PNG</button><div class="contact-row"><a class="btn" id="tgLink" href="https://t.me/" target="_blank">Telegram</a><a class="btn" id="igLink" href="https://instagram.com/" target="_blank">Instagram</a></div><button class="btn ghost" id="copyOrderText">3. Скопировать детали</button></div></div></div>

<script>
const bodyColors={2:'#F2EFE6',4:'#9FA3A5',5:'#4D5B5A',7:'#111111',8:'#C7BA76',9:'#8A7A33',10:'#C8941E',11:'#B76A1C',12:'#C84A1D',13:'#6E2F18',14:'#2D1610',15:'#FFD200',16:'#F7A500',17:'#D98A2B',18:'#FF6A13',19:'#D81919',20:'#B61212',21:'#7A1010',22:'#6A7A1A',23:'#84C71A',24:'#8FA89A',25:'#52A88D',26:'#10B43C',27:'#157C27',28:'#0B3A23',29:'#25C5D8',30:'#7BC5F1',31:'#1B8DDB',32:'#1A72D6',33:'#1A4DFF88',34:'#1D4FB3',35:'#0D245F',36:'#E5A8D4',37:'#E83D9E',38:'#C40063',39:'#B39AD9',40:'#8F59C6',41:'#5122B7',42:'#6B8794',43:'#A7E4D0',44:'#F2EFE6',45:'#4A4F55',46:'#111111',47:'#C8A33A',48:'#FF6A13',49:'#6FC4F0'};
const skinColors={1:'#FFD200',2:'#F3C28B',3:'#D89A62',4:'#A86A3D',5:'#6B3F28',6:'#F7E3C3',7:'#111111',8:'#FFFFFF'};
const skinGroups=[{title:'Кожа',ids:[1,2,6,3,4,5,7,8]}];
const bodyGroups=[{title:'Белый / серый / черный',ids:[2,4,5,7,44,45,46]},{title:'Желтый / оранжевый',ids:[8,9,10,11,15,16,17,18,47,48]},{title:'Красный',ids:[12,13,14,19,20,21]},{title:'Зеленый',ids:[22,23,24,25,26,27,28]},{title:'Синий',ids:[29,30,31,32,33,34,35,49]},{title:'Розовый / фиолетовый',ids:[36,37,38,39,40,41,42,43]}];
let faces=['A1'], hair=[1], prints=[], accessories=[];
const frames=[{id:'white-small',name:'15,5×20,5',cls:'frame-white f-small',m:'small'},{id:'white-square',name:'22×22',cls:'frame-white f-square',m:'square'},{id:'white-big',name:'22,5×31,5',cls:'frame-white f-big',m:'big'},{id:'black-small',name:'15,5×20,5',cls:'frame-black f-small',m:'small'},{id:'black-square',name:'22×22',cls:'frame-black f-square',m:'square'},{id:'black-big',name:'22,5×31,5',cls:'frame-black f-big',m:'big'}];
const steps=[{key:'skin',num:'01',title:'Кожа и лицо',focus:'focus-skin'},{key:'hair',num:'02',title:'Прическа',focus:'focus-hair'},{key:'torso',num:'03',title:'Торс и принт',focus:'focus-torso'},{key:'legs',num:'04',title:'Ноги',focus:'focus-legs'},{key:'accessory',num:'05',title:'Аксессуары',focus:'focus-accessory'},{key:'frame',num:'06',title:'Рамка',focus:'focus-full'}];
const storeKey='mb_v4_people';
function newPerson(n){return{name:'Человек '+n,note:'',face:'A1',hair:1,skin:1,torso:36,legs:31,print:'',accessory:''}}
let people=JSON.parse(localStorage.getItem(storeKey)||'null')||[newPerson(1)];people=people.map((p,i)=>({...newPerson(i+1),...p}));let active=0,step='skin',frame=localStorage.getItem('mb_v4_frame')||'white-square',undo=[],frameBgData=localStorage.getItem('mb_frame_bg')||'',frameBgScale=localStorage.getItem('mb_frame_bg_scale')||'1';
function p(){return people[active]||people[0]}function save(){localStorage.setItem(storeKey,JSON.stringify(people));localStorage.setItem('mb_v4_frame',frame)}function snap(){undo.push(JSON.stringify({people,active,step,frame,frameBgData,frameBgScale}));if(undo.length>20)undo.shift()}function restore(){const r=undo.pop();if(!r)return;const d=JSON.parse(r);people=d.people;active=d.active;step=d.step;frame=d.frame;frameBgData=d.frameBgData;frameBgScale=d.frameBgScale;sync()}
function miniHTML(person){return `<div class="mini-preview" style="--p-skin:${skinColors[person.skin]};--p-torso:${bodyColors[person.torso]};--p-legs:${bodyColors[person.legs]};--skin:${skinColors[person.skin]};--torso:${bodyColors[person.torso]};--legs:${bodyColors[person.legs]}"><div class="part skin"></div><div class="part torso"></div><div class="part legs"></div><img class="shadow-layer" src="./assets/body/base-outline.png"><img class="face-img" src="./assets/faces/${person.face}.png"><img class="hair-img" src="./assets/hair/${person.hair}.png"></div>`}
function renderPeople(){countLabel.textContent=`${people.length}/10`;peopleList.innerHTML='';people.forEach((person,i)=>{const card=document.createElement('div');card.className='person-card '+(i===active?'active':'');card.innerHTML=`${miniHTML(person)}<div><div class="person-title">${person.name||`Человек ${i+1}`}</div><div class="person-meta">лицо ${person.face}, волосы ${person.hair}</div></div><div><button class="icon-btn" data-edit>✎</button><button class="icon-btn" data-del>×</button></div>`;card.querySelector('[data-edit]').onclick=()=>{active=i;step='skin';sync()};card.querySelector('[data-del]').onclick=()=>delPerson(i);peopleList.appendChild(card)})}
function addPersonFn(){if(people.length>=10)return alert('Можно добавить максимум 10 человечков');snap();people.push(newPerson(people.length+1));active=people.length-1;step='skin';sync()}function delPerson(i){if(people.length===1)return alert('Нужен хотя бы один человечек');snap();people.splice(i,1);if(active>=people.length)active=people.length-1;sync()}
function renderSteps(){stepsNav.innerHTML='';steps.forEach(s=>{const idx=steps.findIndex(x=>x.key===s.key);const cur=steps.findIndex(x=>x.key===step);const b=document.createElement('button');b.className='step-btn '+(s.key===step?'active ':'')+(idx<cur?'done':'');b.innerHTML=`<span class="num">${s.num}</span><span>${s.title}</span>`;b.onclick=()=>{step=s.key;sync();window.scrollTo({top:0,behavior:'smooth'})};stepsNav.appendChild(b)})}
function setStepFocus(){const s=steps.find(x=>x.key===step);constructorView.className='figure-wrap '+(s?s.focus:'focus-full');constructorView.classList.toggle('hidden',step==='frame');frameView.classList.toggle('hidden',step!=='frame')}
function renderFigure(){const person=p();document.documentElement.style.setProperty('--skin',skinColors[person.skin]);document.documentElement.style.setProperty('--torso',bodyColors[person.torso]);document.documentElement.style.setProperty('--legs',bodyColors[person.legs]);faceImg.src=`./assets/faces/${person.face}.png`;hairImg.src=`./assets/hair/${person.hair}.png`;printImg.src=person.print||'';printImg.classList.toggle('hidden',!person.print);accImg.src=person.accessory?`./assets/accessories/${person.accessory}.png`:'';accImg.classList.toggle('hidden',!person.accessory);setStepFocus();renderFrame()}
function choiceImg(type,id,active,cb){const folder=type==='face'?'faces':type==='hair'?'hair':'accessories';const b=document.createElement('button');b.className=`choice ${type} ${active?'active':''}`;b.innerHTML=`<img src="./assets/${folder}/${id}.png" alt="${id}">`;b.onclick=()=>{snap();cb();sync()};return b}
function renderSwatches(groups,part){const person=p();let html='';groups.forEach(g=>{html+=`<div class="group"><div class="group-title">${g.title}</div><div class="swatches">`;g.ids.forEach(id=>{const c=(part==='skin'?skinColors:bodyColors)[id];if(c)html+=`<button class="swatch-btn ${+person[part]===+id?'active':''}" style="background:${c}" data-part="${part}" data-id="${id}"></button>`});html+='</div></div>'});return html}
function wireSwatches(){editorBody.querySelectorAll('.swatch-btn').forEach(b=>b.onclick=()=>{snap();p()[b.dataset.part]=+b.dataset.id;sync()})}
function nextButton(){const i=steps.findIndex(s=>s.key===step);return `<button class="btn dark" style="width:100%;margin-top:18px" id="nextStepBtn">${i===steps.length-1?'Готово':'Перейти далее'}</button>`}
function renderEditor(){const person=p();editorBody.innerHTML='';if(step==='skin'){editorBody.innerHTML=`<div class="section-title"><span class="badge">1.1</span> Цвет кожи</div>${renderSwatches(skinGroups,'skin')}<div class="section-title"><span class="badge">1.2</span> Эмоция</div><div class="choice-grid" id="faceGrid"></div><label class="field">Имя<input id="nameInput" value="${person.name||''}" placeholder="Имя персонажа"></label>${nextButton()}`;faces.forEach(id=>faceGrid.appendChild(choiceImg('face',id,person.face===id,()=>person.face=id)));wireSwatches();nameInput.oninput=e=>{person.name=e.target.value;save();renderPeople()}}
if(step==='hair'){editorBody.innerHTML=`<div class="section-title"><span class="badge">2.1</span> Прическа</div><div class="choice-grid" id="hairGrid"></div>${nextButton()}`;hair.forEach(id=>hairGrid.appendChild(choiceImg('hair',id,String(person.hair)===String(id),()=>person.hair=id)))}
if(step==='torso'){editorBody.innerHTML=`<div class="section-title"><span class="badge">3.1</span> Цвет торса</div>${renderSwatches(bodyGroups,'torso')}<div class="section-title"><span class="badge">3.2</span> Принт спереди</div><div class="print-card"><label class="file-label">Сделать свой принт<input type="file" id="printInput" accept="image/*"></label><button class="btn ghost" id="clearPrint">Без принта</button></div><div class="choice-grid" id="printsGrid"></div>${nextButton()}`;wireSwatches();printInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{snap();person.print=r.result;sync()};r.readAsDataURL(f)};clearPrint.onclick=()=>{snap();person.print='';sync()};if(!prints.length)printsGrid.innerHTML='<div class="empty">Готовые принты не найдены</div>';prints.forEach(id=>{const b=document.createElement('button');b.className='choice '+(person.print===`./assets/prints/${id}.png`?'active':'');b.innerHTML=`<img src="./assets/prints/${id}.png">`;b.onclick=()=>{snap();person.print=`./assets/prints/${id}.png`;sync()};printsGrid.appendChild(b)})}
if(step==='legs'){editorBody.innerHTML=`<div class="section-title"><span class="badge">4.1</span> Ноги</div>${renderSwatches(bodyGroups,'legs')}${nextButton()}`;wireSwatches()}
if(step==='accessory'){editorBody.innerHTML=`<div class="section-title"><span class="badge">5.1</span> Аксессуар</div><div class="choice-grid" id="accGrid"></div>${nextButton()}`;const none=document.createElement('button');none.className='choice '+(!person.accessory?'active':'');none.textContent='Без аксессуара';none.onclick=()=>{snap();person.accessory='';sync()};accGrid.appendChild(none);if(!accessories.length){const e=document.createElement('div');e.className='empty';e.textContent='Папка accessories пустая или не добавлена в catalog.json';accGrid.appendChild(e)}accessories.forEach(id=>accGrid.appendChild(choiceImg('acc',id,person.accessory===id,()=>person.accessory=id)))}
if(step==='frame'){const isBlack=frame.startsWith('black'), size=frame.replace('white-','').replace('black-','');editorBody.innerHTML=`<div class="section-title"><span class="badge">6.1</span> Рамка</div><div class="frame-tools"><div class="frame-row"><button class="frame-choice ${!isBlack?'active':''}" data-frame-color="white">Белая</button><button class="frame-choice ${isBlack?'active':''}" data-frame-color="black">Черная</button></div><div class="frame-row three"><button class="frame-choice ${size==='small'?'active':''}" data-frame-size="small">15,5×20,5</button><button class="frame-choice ${size==='square'?'active':''}" data-frame-size="square">22×22</button><button class="frame-choice ${size==='big'?'active':''}" data-frame-size="big">22,5×31,5</button></div><label class="file-label">Загрузить фон рамки<input type="file" id="bgInput" accept="image/*"></label><label class="field">Масштаб фона<input type="range" id="bgScale" min="0.5" max="2.5" step="0.05" value="${frameBgScale}"></label><button class="btn dark" id="openOrderFromEditor">Оформить заказ</button></div>`;editorBody.querySelectorAll('[data-frame-color]').forEach(b=>b.onclick=()=>{snap();frame=b.dataset.frameColor+'-'+size;sync()});editorBody.querySelectorAll('[data-frame-size]').forEach(b=>b.onclick=()=>{snap();frame=(isBlack?'black':'white')+'-'+b.dataset.frameSize;sync()});bgInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{frameBgData=r.result;localStorage.setItem('mb_frame_bg',frameBgData);sync()};r.readAsDataURL(f)};bgScale.oninput=e=>{frameBgScale=e.target.value;localStorage.setItem('mb_frame_bg_scale',frameBgScale);renderFrame()};openOrderFromEditor.onclick=openOrderModal}
const n=document.getElementById('nextStepBtn');if(n)n.onclick=()=>{const i=steps.findIndex(s=>s.key===step);step=steps[Math.min(i+1,steps.length-1)].key;sync();window.scrollTo({top:0,behavior:'smooth'})}}
function frameType(){if(frame.includes('small'))return'small';if(frame.includes('square'))return'square';return'big'}
function getLayout(count){if(count<=2)return [[38,54],[62,54]].slice(0,count);if(count<=5)return [[50,30],[30,67],[50,67],[70,67],[50,83]].slice(0,count);return [[25,20],[50,20],[75,20],[25,48],[50,48],[75,48],[25,76],[50,76],[75,76],[50,92]].slice(0,count)}
function figWH(){const t=frameType();const h=t==='small'?120:t==='square'?78:64;return {w:h*.4,h}}
function renderFrame(){const fd=frames.find(f=>f.id===frame);if(!fd)return;frameBox.className='frame-box '+fd.cls;frameLabel.textContent=(frame.startsWith('black')?'Черная ':'Белая ')+fd.name;if(!document.getElementById('frameBg'))frameBox.insertAdjacentHTML('afterbegin','<div class="frame-bg" id="frameBg"></div>');const bg=document.getElementById('frameBg');bg.style.backgroundImage=frameBgData?`url(${frameBgData})`:'none';bg.style.backgroundSize=`${Math.round(Number(frameBgScale||1)*100)}%`;const pos=getLayout(people.length), s=figWH();miniGrid.innerHTML='';people.forEach((person,i)=>{const xy=pos[i]||[50,50];miniGrid.insertAdjacentHTML('beforeend',`<div class="mini-figure" style="left:${xy[0]}%;top:${xy[1]}%;width:${s.w}px;height:${s.h}px;--skin:${skinColors[person.skin]};--torso:${bodyColors[person.torso]};--legs:${bodyColors[person.legs]}"><div class="part skin"></div><div class="part torso"></div><div class="part legs"></div><img class="shadow-layer" src="./assets/body/base-outline.png"><img class="face-img" src="./assets/faces/${person.face}.png"><img class="hair-img" src="./assets/hair/${person.hair}.png"></div>`)})}
function sync(){save();renderPeople();renderSteps();renderFigure();renderEditor()}
function orderText(){const fd=frames.find(f=>f.id===frame);return `MiniBrick Studio — заказ\n\nРамка: ${frame.startsWith('black')?'черная':'белая'}\nРазмер: ${fd.name}\nФигурок: ${people.length}\n\n`+people.map((x,i)=>`${i+1}. ${x.name}\nЛицо: ${x.face}\nПрическа: ${x.hair}\nКожа: ${x.skin}\nТорс: ${x.torso}\nНоги: ${x.legs}\nКомментарий: ${x.note||'нет'}`).join('\n\n')}
function loadImg(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=src})}function tint(ctx,img,color,x,y,w,h){const c=document.createElement('canvas');c.width=w;c.height=h;const t=c.getContext('2d');t.drawImage(img,0,0,w,h);t.globalCompositeOperation='source-in';t.fillStyle=color;t.fillRect(0,0,w,h);ctx.drawImage(c,x,y,w,h)}
async function exportOrderImage(){const fd=frames.find(f=>f.id===frame), canvas=document.createElement('canvas');canvas.width=1200;canvas.height=1500;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff7fb';ctx.fillRect(0,0,1200,1500);ctx.fillStyle='#8a4f68';ctx.font='900 44px Arial';ctx.textAlign='center';ctx.fillText(`Рамка: ${frame.startsWith('black')?'черная':'белая'}, ${fd.name}`,600,90);const fw=fd.m==='square'?760:620,fh=fd.m==='small'?820:fd.m==='big'?870:760,fx=(1200-fw)/2,fy=150;ctx.fillStyle=frame.startsWith('black')?'#111':'#fff';ctx.fillRect(fx,fy,fw,fh);ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=18;ctx.strokeRect(fx+28,fy+28,fw-56,fh-56);ctx.fillStyle='#f7f7f7';ctx.fillRect(fx+54,fy+54,fw-108,fh-108);const sm=await loadImg('./assets/body/skin-mask.png'),tm=await loadImg('./assets/body/torso-mask.png'),lm=await loadImg('./assets/body/legs-mask.png'),ol=await loadImg('./assets/body/base-outline.png');const layout=getLayout(people.length);const ih=fh-108,iw=fw-108;const pct=fd.m==='small'?.55:fd.m==='square'?.32:.22;const h=ih*pct,w=h*.4;for(let i=0;i<people.length;i++){const person=people[i],xy=layout[i]||[50,50],x=fx+54+iw*xy[0]/100,y=fy+54+ih*xy[1]/100;if(sm)tint(ctx,sm,skinColors[person.skin],x-w/2,y-h/2,w,h);if(tm)tint(ctx,tm,bodyColors[person.torso],x-w/2,y-h/2,w,h);if(lm)tint(ctx,lm,bodyColors[person.legs],x-w/2,y-h/2,w,h);if(ol){ctx.globalAlpha=.18;ctx.drawImage(ol,x-w/2,y-h/2,w,h);ctx.globalAlpha=1}const fi=await loadImg(`./assets/faces/${person.face}.png`),hi=await loadImg(`./assets/hair/${person.hair}.png`);if(fi)ctx.drawImage(fi,x-w/2,y-h/2,w,h);if(hi)ctx.drawImage(hi,x-w/2,y-h/2,w,h)}ctx.fillStyle='#ed2b63';ctx.font='900 46px Arial';ctx.fillText('С любовью MiniBrick 💖',600,fy+fh+100);return canvas.toDataURL('image/png')}
async function openOrderModal(){orderPreviewImg.src=await exportOrderImage();const fd=frames.find(f=>f.id===frame);orderInfo.innerHTML=`<div>Цвет рамки: ${frame.startsWith('black')?'черная':'белая'}</div><div>Размер рамки: ${fd.name}</div><div>Фигурок: ${people.length}</div>`;orderTextarea.value=orderText();orderModal.classList.add('open')}
function exists(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(true);i.onerror=()=>r(false);i.src=src+'?v='+Date.now()})}async function filter(list,folder){const out=[];for(const id of list||[]){if(await exists(`./assets/${folder}/${id}.png`))out.push(id)}return out}
async function loadCatalog(){try{const r=await fetch('./assets/catalog.json?v='+Date.now());if(!r.ok)throw 0;const data=await r.json();faces=await filter(data.faces,'faces');hair=await filter(data.hair,'hair');prints=await filter(data.prints,'prints');accessories=await filter(data.accessories,'accessories');people.forEach(x=>{if(!faces.includes(x.face))x.face=faces[0]||'A1';if(!hair.map(String).includes(String(x.hair)))x.hair=hair[0]||1})}catch(e){console.log('catalog error',e)}}
addPerson.onclick=addPersonFn;showPeopleBtn.onclick=()=>{step='skin';sync()};frameBtn.onclick=()=>{step='frame';sync()};orderBtn.onclick=openOrderModal;undoBtn.onclick=restore;randomBtn.onclick=()=>{snap();if(faces.length)p().face=faces[Math.floor(Math.random()*faces.length)];if(hair.length)p().hair=hair[Math.floor(Math.random()*hair.length)];let sk=Object.keys(skinColors),bd=Object.keys(bodyColors);p().skin=+sk[Math.floor(Math.random()*sk.length)];p().torso=+bd[Math.floor(Math.random()*bd.length)];p().legs=+bd[Math.floor(Math.random()*bd.length)];sync()};orderClose.onclick=()=>orderModal.classList.remove('open');copyOrderText.onclick=()=>{navigator.clipboard?.writeText(orderTextarea.value);alert('Описание заказа скопировано')};downloadOrderImg.onclick=()=>{const a=document.createElement('a');a.href=orderPreviewImg.src;a.download='minibrick-order.png';a.click()};loadCatalog().then(()=>{if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js?v='+Date.now()).then(r=>r.update())}sync()});
</script>
</body>
