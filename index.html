  <style>

    .frame-preview{display:grid;place-items:center;gap:16px}.frame-box{position:relative;overflow:hidden;background:#f7f7f7;display:grid;place-items:center;box-shadow:inset 0 0 0 12px var(--frameColor,#fff),inset 0 0 0 16px rgba(0,0,0,.08),0 18px 36px rgba(0,0,0,.12)}.frame-black{--frameColor:#111}.frame-white{--frameColor:#fff}.f-small{width:210px;height:278px}.f-square{width:270px;height:270px}.f-big{width:250px;height:350px}.frame-bg{position:absolute;inset:16px;background-image:var(--frame-bg);background-size:calc(100% * var(--bg-scale,1));background-position:calc(50% + var(--bg-x,0px)) calc(50% + var(--bg-y,0px));background-repeat:no-repeat;z-index:0}.mini-grid{position:relative;width:100%;height:100%;z-index:2}.mini-figure{position:absolute;width:54px;aspect-ratio:1024/1536;transform:translate(-50%,-50%)}.mini-figure .part,.mini-figure .shadow-layer,.mini-figure .face-img,.mini-figure .hair-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.mini-figure .skin{background:var(--skin)}.mini-figure .torso{background:var(--torso)}.mini-figure .legs{background:var(--legs)}

    .modal{position:fixed;inset:0;z-index:90;display:none;place-items:center;padding:18px;background:rgba(40,10,25,.38);backdrop-filter:blur(12px)}.modal.open{display:grid}.modal-card{width:min(560px,100%);max-height:88dvh;overflow:auto;background:#fff;border-radius:28px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.24)}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.modal-head h2{margin:0;font-size:22px;font-weight:950}.close{width:42px;height:42px;border:0;border-radius:50%;background:#fff0f5;color:var(--red);font-size:24px;font-weight:950}.onboard-card{text-align:center;display:grid;gap:14px}.onboard-emoji{font-size:56px}.onboard-title{font-size:26px;font-weight:950}.onboard-text{color:var(--muted);font-weight:850;line-height:1.45}.dots{display:flex;gap:8px;justify-content:center}.dot{width:9px;height:9px;border-radius:99px;background:#f3bad0}.dot.active{width:28px;background:var(--red)}.order-preview{width:100%;border-radius:22px;background:#fff7fb;border:1px solid var(--line);overflow:hidden;margin-bottom:12px}.order-preview img{width:100%;display:block}.order-info{display:grid;gap:8px;padding:12px;border-radius:18px;background:#fff0f6;font-weight:950;color:#7f4b61;margin-bottom:12px}.order-text{display:none;width:100%;min-height:160px;border:2px solid var(--line);border-radius:18px;padding:12px;font-weight:800;resize:vertical}.order-steps{display:grid;gap:10px;margin-top:12px}.contact-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .splash-screen{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;align-content:center;gap:18px;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.65),transparent 28%),linear-gradient(180deg,#ff6fa8,#ffd5e6);transition:opacity .45s ease,visibility .45s ease}.splash-screen.hide{opacity:0;visibility:hidden}.splash-logo-wrap{width:148px;height:148px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:0 22px 55px rgba(86,24,55,.24);animation:splashPop 1.4s ease-in-out infinite}.splash-logo{width:124px;height:124px;border-radius:50%;object-fit:cover}.splash-title{font-size:24px;font-weight:950;color:#fff;text-shadow:0 4px 14px rgba(86,24,55,.28)}.splash-loader{width:88px;height:8px;border-radius:999px;background:rgba(255,255,255,.45);overflow:hidden}.splash-loader:before{content:"";display:block;width:42%;height:100%;border-radius:999px;background:#fff;animation:splashLoad 1s ease-in-out infinite}@keyframes splashPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}@keyframes splashLoad{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
    body:not(.started) .figure-wrap,body:not(.started) .frame-preview,body:not(.started) .mobile-nav,body:not(.started) .mobile-editor{display:none!important}body.started .start-view{display:none}

     body:not(.started) #orderBtn{

}

<body>
  <div id="splashScreen" class="splash-screen"><div class="splash-logo-wrap"><img src="./logo.png" class="splash-logo" alt=""></div><div class="splash-title">MiniBrick Studio</div><div class="splash-loader"></div></div>
  <div class="app">
    <header><img class="logo" src="./logo.png" alt=""><div><h1>MiniBrick Studio</h1><div class="sub">Конструктор мини-фигурок</div></div><div class="top-actions"><button class="btn" id="showPeopleBtn">Фигурки</button><button class="btn" id="frameBtn">Рамка</button><button class="btn dark" id="orderBtn">Заказ</button></div></header>
    <div class="layout">
      <aside class="panel left"><div class="panel-pad"><h2 class="title">Фигурки <span id="countLabel" class="small"></span></h2><div class="people-list" id="peopleList"></div><button class="btn dark add-card" id="addPerson">+ Добавить фигурку</button></div></aside>
      <main class="stage panel">
        <span class="heart h1">❤</span><span class="heart h2">❤</span><span class="heart h3">❤</span>
        <section id="startView" class="start-view"><img src="./logo.png" class="start-logo" alt=""><h2>Собери свою мини-фигурку</h2><p>Сначала создай персонажей, потом выбери рамку и скачай понятный заказ.</p><button class="btn dark" id="startCustomize">Начать кастомизацию</button></section>
        <div class="stage-toolbar"><div class="tool-group"><button class="btn" id="undoBtn">↶ Отменить</button><button class="btn pink" id="randomBtn">🎲 Случайный образ</button></div></div>
        <section id="constructorView" class="figure-wrap"><div class="part skin"></div><div class="part torso"></div><div class="part legs"></div><img class="shadow-layer" src="./assets/body/base-outline.png" alt=""><img class="face-img" id="faceImg" alt=""><img class="hair-img" id="hairImg" alt=""></section>
        <section id="frameView" class="frame-preview hidden"><div class="frame-box f-square frame-white" id="frameBox"><div class="mini-grid" id="miniGrid"></div></div><b id="frameLabel">Белая 22×22</b></section>
      </main>
      <aside class="panel right"><div class="editor-tabs" id="tabs"></div><div class="options" id="options"></div><div class="panel-pad"><label class="field">Имя<input id="nameInput" placeholder="Например, Вика"></label><label class="field">Комментарий<textarea id="noteInput" rows="3" placeholder="что учесть мастеру"></textarea></label></div><div class="frame-tools hidden" id="frameTools"><label class="bg-upload">Загрузить фон рамки<input type="file" id="bgInput" accept="image/*"></label><label class="range-field">Масштаб<input type="range" id="bgScale" min="0.5" max="2.5" step="0.01" value="1"></label><label class="range-field">По горизонтали<input type="range" id="bgX" min="-100" max="100" step="1" value="0"></label><label class="range-field">По вертикали<input type="range" id="bgY" min="-100" max="100" step="1" value="0"></label><button class="btn" id="clearBg">Убрать фон</button></div></aside>
    </div>
  </div>
  <nav class="mobile-nav"><button data-mobile-tab="people">👥<br>Люди</button><button data-mobile-tab="face">🙂<br>Лица</button><button data-mobile-tab="hair">💇<br>Волосы</button><button data-mobile-tab="colors">🎨<br>Цвета</button><button data-mobile-tab="frame">🖼<br>Рамка</button></nav>
  <div class="mobile-editor" id="mobileEditor"><div class="mobile-editor-inner" id="mobileEditorInner"></div></div>
  <div class="modal" id="onboardModal"><div class="modal-card onboard-card"><div class="onboard-emoji" id="onEmoji"></div><div class="onboard-title" id="onTitle"></div><div class="onboard-text" id="onText"></div><div class="dots" id="onDots"></div><button class="btn dark" id="onNext">Дальше</button></div></div>
  <div class="modal" id="orderModal"><div class="modal-card"><div class="modal-head"><h2>Заказ</h2><button class="close" id="orderClose">×</button></div><div class="order-preview"><img id="orderPreviewImg" alt=""></div><div class="order-info" id="orderInfo"></div><textarea class="order-text" id="orderTextarea" readonly></textarea><div class="order-steps"><button class="btn dark" id="downloadOrderImg">1. Скачать PNG</button><div class="contact-row"><a class="btn" id="tgLink" href="#" target="_blank">2. Telegram</a><a class="btn" id="igLink" href="#" target="_blank">Instagram</a></div><button class="btn" id="copyOrderText">3. Скопировать детали</button></div></div></div>
<script>
const bodyColors={2:'#F2EFE6',4:'#9FA3A5',5:'#4D5B5A',7:'#111111',8:'#C7BA76',9:'#8A7A33',10:'#C8941E',11:'#B76A1C',12:'#C84A1D',13:'#6E2F18',14:'#2D1610',15:'#FFD200',16:'#F7A500',17:'#D98A2B',18:'#FF6A13',19:'#D81919',20:'#B61212',21:'#7A1010',22:'#6A7A1A',23:'#84C71A',24:'#8FA89A',25:'#52A88D',26:'#10B43C',27:'#157C27',28:'#0B3A23',29:'#25C5D8',30:'#7BC5F1',31:'#1B8DDB',32:'#1A72D6',33:'#1A4DFF88',34:'#1D4FB3',35:'#0D245F',36:'#E5A8D4',37:'#E83D9E',38:'#C40063',39:'#B39AD9',40:'#8F59C6',41:'#5122B7',42:'#6B8794',43:'#A7E4D0',44:'#F2EFE6',45:'#4A4F55',46:'#111111',47:'#C8A33A',48:'#FF6A13',49:'#6FC4F0'};
const skinColors={1:'#FFD200',2:'#F3C28B',3:'#D89A62',4:'#A86A3D',5:'#6B3F28',6:'#F7E3C3',7:'#111111',8:'#FFFFFF'};
let faces=['A1']; let hair=[1];
const frames=[{id:'white-small',name:'Белая 15,5×20,5',cls:'frame-white f-small',ratio:15.5/20.5},{id:'white-square',name:'Белая 22×22',cls:'frame-white f-square',ratio:1},{id:'white-big',name:'Белая 22,5×31,5',cls:'frame-white f-big',ratio:22.5/31.5},{id:'black-small',name:'Черная 15,5×20,5',cls:'frame-black f-small',ratio:15.5/20.5},{id:'black-square',name:'Черная 22×22',cls:'frame-black f-square',ratio:1},{id:'black-big',name:'Черная 22,5×31,5',cls:'frame-black f-big',ratio:22.5/31.5}];
const tabLabels={face:['🙂','Лица'],hair:['💇','Волосы'],skin:['🖐','Кожа'],torso:['👕','Торс'],legs:['👖','Ноги'],frame:['🖼','Рамка']};
const storeKey='mb_v2_people';
function newPerson(n){return{name:'Человек '+n,note:'',face:'A1',hair:1,skin:1,torso:36,legs:31}}
let people=JSON.parse(localStorage.getItem(storeKey)||'null')||[newPerson(1)];
people=people.map((p,i)=>({...newPerson(i+1),...p}));
let active=0, tab='face', mobileTab='people', mobileColorPart='skin', frameMode=false, frame=localStorage.getItem('mb_v2_frame')||'white-square', undoStack=[];
let frameBgData=localStorage.getItem('mb_frame_bg')||'', frameBgScale=localStorage.getItem('mb_frame_bg_scale')||'1', frameBgX=localStorage.getItem('mb_frame_bg_x')||'0', frameBgY=localStorage.getItem('mb_frame_bg_y')||'0';
function save(){localStorage.setItem(storeKey,JSON.stringify(people));localStorage.setItem('mb_v2_frame',frame)}
function snapshot(){undoStack.push(JSON.stringify({people,active,frame,frameBgData,frameBgScale,frameBgX,frameBgY})); if(undoStack.length>20) undoStack.shift()}
function restore(){const s=undoStack.pop(); if(!s)return; const d=JSON.parse(s); people=d.people; active=d.active; frame=d.frame; frameBgData=d.frameBgData; frameBgScale=d.frameBgScale; frameBgX=d.frameBgX; frameBgY=d.frameBgY; applyFrameBg(); sync()}
function p(){return people[active]||people[0]}
function miniHTML(person,cls='mini-preview'){return `<div class="${cls}" style="--p-skin:${skinColors[person.skin]};--p-torso:${bodyColors[person.torso]};--p-legs:${bodyColors[person.legs]};--skin:${skinColors[person.skin]};--torso:${bodyColors[person.torso]};--legs:${bodyColors[person.legs]}"><div class="part skin"></div><div class="part torso"></div><div class="part legs"></div><img class="shadow-layer" src="./assets/body/base-outline.png"><img class="face-img" src="./assets/faces/${person.face}.png"><img class="hair-img" src="./assets/hair/${person.hair}.png"></div>`}
function renderPeople(){countLabel.textContent=`${people.length}/10`;peopleList.innerHTML='';people.forEach((person,i)=>{const card=document.createElement('div');card.className='person-card '+(i===active?'active':'');card.innerHTML=`${miniHTML(person)}<div><b>${person.name||`Человек ${i+1}`}</b><div class="small">лицо ${person.face}, волосы ${person.hair}</div></div><div class="person-actions"><button class="icon-btn" data-edit="${i}">✎</button><button class="icon-btn" data-del="${i}">×</button></div>`;card.querySelector('[data-edit]').onclick=()=>{active=i;frameMode=false;tab='face';mobileTab='face';sync()};card.querySelector('[data-del]').onclick=()=>delPerson(i);peopleList.appendChild(card)})}
function delPerson(i){if(people.length===1){alert('Нужен хотя бы один человечек');return} snapshot(); people.splice(i,1); if(active>=people.length) active=people.length-1; sync()}
function addNewPerson(){if(people.length>=10){alert('Можно добавить максимум 10 человечков');return} snapshot(); people.push(newPerson(people.length+1)); active=people.length-1; mobileTab='people'; frameMode=false; sync()}
function renderTabs(){tabs.innerHTML='';Object.entries(tabLabels).forEach(([k,v])=>{const b=document.createElement('button');b.className='tab '+(tab===k?'active':'');b.innerHTML=`<span>${v[0]}</span><span>${v[1]}</span>`;b.onclick=()=>{tab=k;frameMode=k==='frame';sync()};tabs.appendChild(b)});frameTools.classList.toggle('hidden',tab!=='frame')}
function opt(label,isActive,onClick,color){const b=document.createElement('button');b.className='opt '+(isActive?'active':'');b.innerHTML=color?`<span class="swatch" style="background:${color}"></span><span>${label}</span>`:label;b.onclick=()=>{snapshot();onClick();sync()};options.appendChild(b)}
function renderOptions(){options.innerHTML='';const person=p();if(tab==='face')faces.forEach(id=>opt(id,person.face===id,()=>person.face=id));if(tab==='hair')hair.forEach(id=>opt(id,person.hair==id,()=>person.hair=id));if(tab==='skin')Object.entries(skinColors).forEach(([id,c])=>opt(id,+person.skin===+id,()=>person.skin=+id,c));if(tab==='torso')Object.entries(bodyColors).forEach(([id,c])=>opt(id,+person.torso===+id,()=>person.torso=+id,c));if(tab==='legs')Object.entries(bodyColors).forEach(([id,c])=>opt(id,+person.legs===+id,()=>person.legs=+id,c));if(tab==='frame')frames.forEach(f=>opt(f.name,frame===f.id,()=>{frame=f.id;frameMode=true}))}
function renderFigure(){const person=p();document.documentElement.style.setProperty('--skin',skinColors[person.skin]);document.documentElement.style.setProperty('--torso',bodyColors[person.torso]);document.documentElement.style.setProperty('--legs',bodyColors[person.legs]);faceImg.src=`./assets/faces/${person.face}.png`;hairImg.src=`./assets/hair/${person.hair}.png`;constructorView.classList.toggle('hidden',frameMode);frameView.classList.toggle('hidden',!frameMode);nameInput.value=person.name;noteInput.value=person.note;renderFrame()}
function getFrameLayout(count){if(count<=2)return [[38,50],[62,50]].slice(0,count);if(count<=5)return [[50,30],[32,58],[50,58],[68,58],[50,76]].slice(0,count);return [[42,24],[58,24],[25,48],[42,48],[58,48],[75,48],[25,72],[42,72],[58,72],[75,72]].slice(0,count)}
function renderFrame(){const f=frames.find(x=>x.id===frame);frameBox.className='frame-box '+f.cls;frameLabel.textContent=f.name;if(!document.getElementById('frameBg'))frameBox.insertAdjacentHTML('afterbegin','<div class="frame-bg" id="frameBg"></div>');const positions=getFrameLayout(people.length);miniGrid.innerHTML=people.map((person,i)=>`<div class="mini-figure" style="left:${positions[i][0]}%;top:${positions[i][1]}%;--skin:${skinColors[person.skin]};--torso:${bodyColors[person.torso]};--legs:${bodyColors[person.legs]}"><div class="part skin"></div><div class="part torso"></div><div class="part legs"></div><img class="shadow-layer" src="./assets/body/base-outline.png"><img class="face-img" src="./assets/faces/${person.face}.png"><img class="hair-img" src="./assets/hair/${person.hair}.png"></div>`).join('')}
function chip(label,isActive,onClick,color){const b=document.createElement('button');b.className='mobile-chip '+(isActive?'active':'');b.innerHTML=color?`<span class="mobile-swatch" style="background:${color}"></span><small>${label}</small>`:label;b.onclick=onClick;mobileEditorInner.appendChild(b)}
function renderMobileEditor(){
  mobileEditorInner.innerHTML='';
  const person=p();

  if(mobileTab==='people'){
    const nameBox=document.createElement('div');
    nameBox.className='mobile-names-box';

    nameBox.innerHTML=`
      <div class="name-row">
        <input value="${person.name || `Человек ${active+1}`}" placeholder="Имя персонажа">
        <button data-add-person type="button">+</button>
      </div>
    `;

    mobileEditorInner.appendChild(nameBox);

    nameBox.querySelector('input').oninput=e=>{
      person.name=e.target.value || `Человек ${active+1}`;
      save();
      renderPeople();
    };

    nameBox.querySelector('[data-add-person]').onclick=addNewPerson;

    const peopleRow=document.createElement('div');
    peopleRow.className='people-row';
    mobileEditorInner.appendChild(peopleRow);

    people.forEach((item,i)=>{
      const btn=document.createElement('button');
      btn.className='mobile-chip '+(i===active?'active':'');
      btn.textContent=item.name || `Человек ${i+1}`;

      btn.onclick=()=>{
        active=i;
        frameMode=false;
        mobileTab='people';
        sync();
      };

      peopleRow.appendChild(btn);
    });

    const addBtn=document.createElement('button');
    addBtn.className='mobile-chip add-person-chip';
    addBtn.textContent='+';
    addBtn.onclick=addNewPerson;
    peopleRow.appendChild(addBtn);

    return;
  }

  if(mobileTab==='face'){
    faces.forEach(id=>{
      chip(id,person.face===id,()=>{
        snapshot();
        person.face=id;
        sync();
      });
    });
    return;
  }

  if(mobileTab==='hair'){
    hair.forEach(id=>{
      chip(id,person.hair==id,()=>{
        snapshot();
        person.hair=id;
        sync();
      });
    });
    return;
  }

  if(mobileTab==='colors'){
    const tabsWrap=document.createElement('div');
    tabsWrap.className='mobile-color-tabs';

    tabsWrap.innerHTML=`
      <button class="${mobileColorPart==='skin'?'active':''}" data-color-part="skin">Кожа</button>
      <button class="${mobileColorPart==='torso'?'active':''}" data-color-part="torso">Торс</button>
      <button class="${mobileColorPart==='legs'?'active':''}" data-color-part="legs">Ноги</button>
    `;

    mobileEditorInner.appendChild(tabsWrap);

    tabsWrap.querySelectorAll('button').forEach(btn=>{
      btn.onclick=()=>{
        mobileColorPart=btn.dataset.colorPart;
        tab=mobileColorPart;
        renderMobileEditor();
      };
    });

    const palette=mobileColorPart==='skin' ? skinColors : bodyColors;

    Object.entries(palette).forEach(([id,c])=>{
      chip(id,+person[mobileColorPart]===+id,()=>{
        snapshot();
        person[mobileColorPart]=+id;
        sync();
      },c);
    });

    return;
  }

  if(mobileTab==='frame'){
    frames.forEach(f=>{
      chip(f.name,frame===f.id,()=>{
        snapshot();
        frame=f.id;
        tab='frame';
        frameMode=true;
        sync();
      });
    });

    chip('Фон',false,()=>{
      bgInput.click();
    });

    return;
  }
}
function sync(){save();renderPeople();renderTabs();renderOptions();renderFigure();renderMobileEditor();document.querySelectorAll('[data-mobile-tab]').forEach(btn=>btn.classList.toggle('active',btn.dataset.mobileTab===mobileTab))}
function applyFrameBg(){document.documentElement.style.setProperty('--frame-bg',frameBgData?`url(${frameBgData})`:'none');document.documentElement.style.setProperty('--bg-scale',frameBgScale);document.documentElement.style.setProperty('--bg-x',frameBgX+'px');document.documentElement.style.setProperty('--bg-y',frameBgY+'px');if(bgScale)bgScale.value=frameBgScale;if(bgX)bgX.value=frameBgX;if(bgY)bgY.value=frameBgY}
function frameInfo(){const f=frames.find(x=>x.id===frame);return{f,color:f.id.includes('black')?'черная':'белая',size:f.name.replace('Белая ','').replace('Черная ','')}}
function orderText(){const info=frameInfo();return `MiniBrick Studio — заказ\n\nРамка: ${info.color}\nРазмер рамки: ${info.size}\nКоличество человечков: ${people.length}\n\nФайлы для сборки:\n`+people.map((person,i)=>`${i+1}. ${person.name}\nЛицо: assets/faces/${person.face}.png\nПрическа: assets/hair/${person.hair}.png\nКожа: ${person.skin}\nТорс: ${person.torso}\nНоги: ${person.legs}\nКомментарий: ${person.note||'нет'}`).join('\n\n')}
function loadImg(src){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>resolve(null);
    img.src=src;
  });
}
function drawTinted(ctx,img,color,x,y,w,h){const temp=document.createElement('canvas');temp.width=w;temp.height=h;const t=temp.getContext('2d');t.drawImage(img,0,0,w,h);t.globalCompositeOperation='source-in';t.fillStyle=color;t.fillRect(0,0,w,h);ctx.drawImage(temp,x,y,w,h)}
async function exportOrderImage(){
  const info=frameInfo();

  const canvas=document.createElement('canvas');
  canvas.width=1200;
  canvas.height=1500;

  const ctx=canvas.getContext('2d');

  ctx.fillStyle='#fff7fb';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#7f4b61';
  ctx.font='900 44px Inter, Arial';
  ctx.textAlign='center';
  ctx.fillText(`Рамка: ${info.color}, ${info.size}`,600,90);

  const isSmall=info.f.id.includes('small');
  const isBig=info.f.id.includes('big');
  const isSquare=info.f.id.includes('square');

  let frameW=760;
  let frameH=760;

  if(isSmall){
    frameW=620;
    frameH=820;
  }

  if(isBig){
    frameW=620;
    frameH=870;
  }

  if(isSquare){
    frameW=760;
    frameH=760;
  }

  const frameX=(canvas.width-frameW)/2;
  const frameY=150;

  ctx.fillStyle=info.color==='черная' ? '#111' : '#fff';
  ctx.fillRect(frameX,frameY,frameW,frameH);

  ctx.strokeStyle='rgba(0,0,0,.12)';
  ctx.lineWidth=18;
  ctx.strokeRect(frameX+28,frameY+28,frameW-56,frameH-56);

  ctx.fillStyle='#f7f7f7';
  ctx.fillRect(frameX+54,frameY+54,frameW-108,frameH-108);

  if(frameBgData){
    const bg=await loadImg(frameBgData);
    if(bg){
      ctx.save();
      ctx.beginPath();
      ctx.rect(frameX+54,frameY+54,frameW-108,frameH-108);
      ctx.clip();

      const scale=Number(frameBgScale || 1);
      const bw=(frameW-108)*scale;
      const bh=bw*(bg.height/bg.width);
      const bx=frameX+54+(frameW-108-bw)/2+Number(frameBgX || 0)*2;
      const by=frameY+54+(frameH-108-bh)/2+Number(frameBgY || 0)*2;

      ctx.drawImage(bg,bx,by,bw,bh);
      ctx.restore();
    }
  }

  const skinMask=await loadImg('./assets/body/skin-mask.png');
  const torsoMask=await loadImg('./assets/body/torso-mask.png');
  const legsMask=await loadImg('./assets/body/legs-mask.png');
  const outline=await loadImg('./assets/body/base-outline.png');

  const positions=getFrameLayout(people.length);

  for(let i=0;i<people.length;i++){
    const p=people[i];
    const [px,py]=positions[i];

    const x=frameX + frameW*px/100;
    const y=frameY + frameH*py/100;

    const w=people.length<=2 ? 150 : 120;
    const h=w*1.5;

    if(skinMask) drawTinted(ctx,skinMask,skinColors[p.skin],x-w/2,y-h/2,w,h);
    if(torsoMask) drawTinted(ctx,torsoMask,bodyColors[p.torso],x-w/2,y-h/2,w,h);
    if(legsMask) drawTinted(ctx,legsMask,bodyColors[p.legs],x-w/2,y-h/2,w,h);

    if(outline){
      ctx.globalAlpha=.18;
      ctx.drawImage(outline,x-w/2,y-h/2,w,h);
      ctx.globalAlpha=1;
    }

    const face=await loadImg(`./assets/faces/${p.face}.png`);
    const hairAsset=await loadImg(`./assets/hair/${p.hair}.png`);

    if(face) ctx.drawImage(face,x-w/2,y-h/2,w,h);
    if(hairAsset) ctx.drawImage(hairAsset,x-w/2,y-h/2,w,h);
  }

  ctx.fillStyle='#ed2b63';
  ctx.font='900 46px Inter, Arial';
  ctx.textAlign='center';
  ctx.fillText('С любовью MiniBrick 💖',600,frameY+frameH+100);

  return canvas.toDataURL('image/png');
}
async function openOrderModal(){const info=frameInfo();orderPreviewImg.src=await exportOrderImage();orderInfo.innerHTML=`
  <div>Цвет рамки: ${info.color}</div>
  <div>Размер рамки: ${info.size}</div>
`;

orderTextarea.value=orderText();
orderModal.classList.add('open');
}
async function loadCatalog(){try{const res=await fetch('./assets/catalog.json?v='+Date.now());if(!res.ok)throw new Error('catalog not found');const data=await res.json();if(Array.isArray(data.faces)&&data.faces.length)faces=data.faces;if(Array.isArray(data.hair)&&data.hair.length)hair=data.hair}catch(e){console.log('Каталог ассетов не загрузился',e)}}
function showOnboarding(){if(localStorage.getItem('mb_v2_onboarded')==='1')return;const slides=[['🧱','Собери','Создай до 10 фигурок. Каждую можно редактировать и удалить.'],['🖼','Выбери рамку','Подбери цвет, размер и фон рамки.'],['📦','Оформи заказ','Скачай PNG и отправь детали в сообщения.']];let i=0;function draw(){onEmoji.textContent=slides[i][0];onTitle.textContent=slides[i][1];onText.textContent=slides[i][2];onDots.innerHTML=slides.map((_,n)=>`<span class="dot ${n===i?'active':''}"></span>`).join('');onNext.textContent=i===slides.length-1?'Понятно':'Дальше';onboardModal.classList.add('open')}onNext.onclick=()=>{if(i<slides.length-1){i++;draw()}else{localStorage.setItem('mb_v2_onboarded','1');onboardModal.classList.remove('open')}};draw()}
addPerson.onclick=addNewPerson;showPeopleBtn.onclick=()=>{active=0;mobileTab='people';frameMode=false;tab='face';sync()};frameBtn.onclick=()=>{mobileTab='frame';tab='frame';frameMode=true;sync()};orderBtn.onclick=()=>openOrderModal();undoBtn.onclick=restore;randomBtn.onclick=()=>{snapshot();const person=p();person.face=faces[Math.floor(Math.random()*faces.length)];person.hair=hair[Math.floor(Math.random()*hair.length)];person.skin=Object.keys(skinColors)[Math.floor(Math.random()*Object.keys(skinColors).length)];person.torso=Object.keys(bodyColors)[Math.floor(Math.random()*Object.keys(bodyColors).length)];person.legs=Object.keys(bodyColors)[Math.floor(Math.random()*Object.keys(bodyColors).length)];sync()};nameInput.oninput=e=>{p().name=e.target.value||`Человек ${active+1}`;save();renderPeople()};noteInput.oninput=e=>{p().note=e.target.value;save()};document.querySelectorAll('[data-mobile-tab]').forEach(btn=>btn.onclick=()=>{mobileTab=btn.dataset.mobileTab;if(mobileTab==='frame'){tab='frame';frameMode=true}else{frameMode=false;if(mobileTab==='face')tab='face';if(mobileTab==='hair')tab='hair';if(mobileTab==='colors')tab='skin'}sync()});startCustomize.onclick=()=>{document.body.classList.add('started');localStorage.setItem('mb_v2_started','1');mobileTab='people';frameMode=false;sync()};if(localStorage.getItem('mb_v2_started')==='1')document.body.classList.add('started');bgInput.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{frameBgData=r.result;localStorage.setItem('mb_frame_bg',frameBgData);tab='frame';frameMode=true;applyFrameBg();sync()};r.readAsDataURL(file)};bgScale.oninput=e=>{frameBgScale=e.target.value;localStorage.setItem('mb_frame_bg_scale',frameBgScale);applyFrameBg()};bgX.oninput=e=>{frameBgX=e.target.value;localStorage.setItem('mb_frame_bg_x',frameBgX);applyFrameBg()};bgY.oninput=e=>{frameBgY=e.target.value;localStorage.setItem('mb_frame_bg_y',frameBgY);applyFrameBg()};clearBg.onclick=()=>{frameBgData='';localStorage.removeItem('mb_frame_bg');applyFrameBg()};orderClose.onclick=()=>orderModal.classList.remove('open');copyOrderText.onclick=()=>{navigator.clipboard?.writeText(orderTextarea.value);alert('Детали заказа скопированы')};downloadOrderImg.onclick=()=>{const a=document.createElement('a');a.href=orderPreviewImg.src;a.download='minibrick-order.png';a.click()};tgLink.href='https://t.me/';igLink.href='https://instagram.com/';applyFrameBg();loadCatalog().then(()=>{if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');sync();showOnboarding()});window.addEventListener('load',()=>setTimeout(()=>splashScreen.classList.add('hide'),1800));
</script>
