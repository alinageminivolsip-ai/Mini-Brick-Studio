name: Update catalog.json

on:
  push:
    paths:
      - 'assets/accessories/**'
      - 'assets/faces/**'
      - 'assets/hair/**'
      - 'assets/prints/**'
      - 'assets/backgrounds/**'
  workflow_dispatch:

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build catalog.json
        run: |
          python3 - <<'PYEOF'
          import os, json

          ROOT = "assets"
          EXTS = {".png", ".jpg", ".jpeg", ".webp", ".svg"}

          def sort_key(value):
              s = str(value)
              prefix = ''.join([c for c in s if not c.isdigit()])
              digits = ''.join([c for c in s if c.isdigit()])
              number = int(digits) if digits else 0
              return (prefix, number, s)

          def scan_ids(folder):
              path = os.path.join(ROOT, folder)
              if not os.path.isdir(path):
                  return []
              ids = []
              for f in os.listdir(path):
                  full = os.path.join(path, f)
                  stem, ext = os.path.splitext(f)

                  if not os.path.isfile(full):
                      continue

                  if f.startswith((".", "_")):
                      continue

                  if ext.lower() not in EXTS:
                      continue

                  ids.append(stem)

              return sorted(ids, key=sort_key)

          def scan_hair_tree():
              hair_root = os.path.join(ROOT, "hair")
              result = {
                  "all": [],
                  "female": [],
                  "male": [],
                  "other": []
              }

              if not os.path.isdir(hair_root):
                  return result

              for f in os.listdir(hair_root):
                  full = os.path.join(hair_root, f)
                  stem, ext = os.path.splitext(f)

                  if not os.path.isfile(full):
                      continue

                  if f.startswith((".", "_")):
                      continue

                  if ext.lower() not in EXTS:
                      continue

                  result["all"].append(stem)

                  name = stem.lower()

                  if name.startswith(("f", "female", "w", "woman")):
                      result["female"].append(stem)
                  elif name.startswith(("m", "male", "man")):
                      result["male"].append(stem)
                  else:
                      result["other"].append(stem)

              for key in result:
                  result[key] = sorted(result[key], key=sort_key)

              return result

          def is_service_file(stem):
              return (
                  stem.endswith("-mask")
                  or stem.endswith("-left")
                  or stem.endswith("-right-mask")
                  or stem.endswith("_mask")
              )

          faces = scan_ids("faces")
          hair = scan_hair_tree()
          prints = scan_ids("prints")
          backgrounds = scan_ids("backgrounds")

          accessories = {}
          acc_root = os.path.join(ROOT, "accessories")

          if os.path.isdir(acc_root):
              for entry in sorted(os.listdir(acc_root)):
                  if entry.startswith((".", "_")):
                      continue

                  full = os.path.join(acc_root, entry)

                  if os.path.isdir(full):
                      ids = []

                      for f in os.listdir(full):
                          file_path = os.path.join(full, f)
                          stem, ext = os.path.splitext(f)

                          if not os.path.isfile(file_path):
                              continue

                          if f.startswith((".", "_")):
                              continue

                          if ext.lower() not in EXTS:
                              continue

                          if is_service_file(stem):
                              continue

                          ids.append(stem)

                      ids = sorted(ids, key=sort_key)

                      if ids:
                          accessories[entry] = ids

                  else:
                      stem, ext = os.path.splitext(entry)

                      if ext.lower() in EXTS and not is_service_file(stem):
                          accessories.setdefault("other", []).append(stem)

          for key in accessories:
              accessories[key] = sorted(accessories[key], key=sort_key)

          catalog_path = os.path.join(ROOT, "catalog.json")

          existing = {}
          if os.path.exists(catalog_path):
              try:
                  with open(catalog_path, "r", encoding="utf-8") as f:
                      existing = json.load(f)
              except:
                  pass

          catalog = {**existing}

          if faces:
              catalog["faces"] = faces

          if hair["all"]:
              catalog["hair"] = hair

          if prints:
              catalog["prints"] = prints

          if backgrounds:
              catalog["backgrounds"] = backgrounds

          catalog["accessories"] = accessories
          catalog["version"] = int(catalog.get("version", 0)) + 1

          with open(catalog_path, "w", encoding="utf-8") as f:
              json.dump(catalog, f, ensure_ascii=False, indent=2)

          print(
              f"Done: "
              f"{len(faces)} faces, "
              f"{len(hair['all'])} hair, "
              f"{len(prints)} prints, "
              f"{len(backgrounds)} backgrounds, "
              f"accessory categories: {list(accessories.keys())}, "
              f"version: {catalog['version']}"
          )
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/catalog.json

          git diff --cached --quiet || git commit -m "chore: auto-update catalog.json [skip ci]"

          git push
