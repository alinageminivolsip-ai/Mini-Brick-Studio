name: Update catalog.json

on:
  push:
    paths:
      - 'assets/accessories/**'
      - 'assets/faces/**'
      - 'assets/hair/**'
      - 'assets/prints/**'
  workflow_dispatch:

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build catalog.json
        run: |
          python3 - <<'PYEOF'
          import os, json

          ROOT = "assets"
          EXTS = {'.png','.jpg','.jpeg','.webp','.svg'}

          def scan_ids(folder):
              path = os.path.join(ROOT, folder)
              if not os.path.isdir(path): return []
              return sorted(
                  os.path.splitext(f)[0]
                  for f in os.listdir(path)
                  if not f.startswith(('.','_')) and os.path.splitext(f)[1].lower() in EXTS
              )

          faces = scan_ids("faces")
          raw_hair = scan_ids("hair")
          hair = []
          for h in raw_hair:
              try: hair.append(int(h))
              except: hair.append(h)
          prints = scan_ids("prints")

          def to_label(s):
              return s.replace('-',' ').replace('_',' ').title()

          def is_service_file(stem):
              return stem.endswith('-mask') or stem.endswith('-left') or stem.endswith('_mask')

          accessories = {}
          acc_root = os.path.join(ROOT, "accessories")
          if os.path.isdir(acc_root):
              for entry in sorted(os.listdir(acc_root)):
                  if entry.startswith(('.','_')): continue
                  full = os.path.join(acc_root, entry)
                  if os.path.isdir(full):
                      ids = sorted(
                          os.path.splitext(f)[0]
                          for f in os.listdir(full)
                          if not f.startswith(('.','_'))
                          and os.path.splitext(f)[1].lower() in EXTS
                          and not is_service_file(os.path.splitext(f)[0])
                      )
                      if ids:
                          accessories[entry] = ids
                  else:
                      stem, ext = os.path.splitext(entry)
                      if ext.lower() in EXTS and not is_service_file(stem):
                          accessories.setdefault("other", []).append(stem)

          catalog_path = os.path.join(ROOT, "catalog.json")
          existing = {}
          if os.path.exists(catalog_path):
              try: existing = json.load(open(catalog_path))
              except: pass

          catalog = {**existing}
          if faces:  catalog["faces"]  = faces
          if hair:   catalog["hair"]   = hair
          if prints: catalog["prints"] = prints
          catalog["accessories"] = accessories

          json.dump(catalog, open(catalog_path,"w"), ensure_ascii=False, indent=2)
          print(f"Done: {len(faces)} faces, {len(hair)} hair, accessories: {list(accessories.keys())}")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/catalog.json
          git diff --cached --quiet || git commit -m "chore: auto-update catalog.json [skip ci]"
          git push
